<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Nitin Ganneboina | Finance Tech & AI Storytelling</title>
  <meta name="description" content="Transforming Finance through Tech. Exploring Stories through AI." />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#030108" />
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16.png" />
  <link rel="icon" type="image/svg+xml" href="logo.svg" />
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    html, body {
      width:100%; height:100%; height:100dvh;
      overflow:hidden; background:#030108;
      font-family:'Inter',sans-serif; color:#c8d5f0;
      -webkit-font-smoothing:antialiased;
      -moz-osx-font-smoothing: grayscale;
      scrollbar-width:none;
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    }
    html::-webkit-scrollbar { display:none; }
    body { cursor:none; }

    /* ─── CUSTOM CURSOR ─── */
    #cursor-dot {
      position:fixed; z-index:9999; pointer-events:none;
      width:8px; height:8px; border-radius:50%;
      background:rgba(168,192,255,0.9);
      transform:translate(-50%,-50%);
      transition: width 0.3s, height 0.3s, background 0.3s;
      mix-blend-mode: screen;
    }
    #cursor-ring {
      position:fixed; z-index:9998; pointer-events:none;
      width:40px; height:40px; border-radius:50%;
      border:1px solid rgba(168,192,255,0.25);
      transform:translate(-50%,-50%);
      transition: width 0.4s cubic-bezier(0.16,1,0.3,1), height 0.4s cubic-bezier(0.16,1,0.3,1),
                  border-color 0.3s, opacity 0.3s;
    }
    body:hover #cursor-dot, body:hover #cursor-ring { opacity:1; }
    .cursor-hover #cursor-dot {
      width:14px; height:14px;
      background:rgba(168,192,255,0.5);
    }
    .cursor-hover #cursor-ring {
      width:60px; height:60px;
      border-color:rgba(168,192,255,0.5);
    }

    /* ─── LOADING SCREEN ─── */
    #loader {
      position:fixed; inset:0; z-index:999;
      background:#030108;
      display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      transition: opacity 2s cubic-bezier(0.16,1,0.3,1);
    }
    #loader.done { opacity:0; pointer-events:none; }
    #loader.ready { pointer-events:none; }
    .loader-logo {
      width:60px; height:60px; margin-bottom:30px;
      position:relative;
    }
    .loader-logo svg {
      width:100%; height:100%;
      animation: logoSpin 4s linear infinite;
    }
    @keyframes logoSpin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .loader-text {
      font-family:'Space Grotesk',sans-serif;
      font-size:0.7rem; letter-spacing:0.4em;
      text-transform:uppercase;
      color:rgba(168,192,255,0.35);
      margin-bottom:24px;
    }
    .loader-bar {
      width:200px; height:1px;
      background:rgba(168,192,255,0.06);
      border-radius:1px; overflow:hidden;
      position:relative;
    }
    .loader-fill {
      height:100%; width:0%;
      background:linear-gradient(90deg, rgba(168,192,255,0.3), rgba(168,192,255,0.7));
      transition: width 0.3s cubic-bezier(0.16,1,0.3,1);
    }
    .loader-percent {
      font-family:'Space Grotesk',sans-serif;
      font-size:0.6rem; letter-spacing:0.2em;
      color:rgba(168,192,255,0.2);
      margin-top:14px;
      font-variant-numeric: tabular-nums;
    }

    /* ─── TOUCH LAYER ─── */
    #touch-layer {
      position:fixed; inset:0; z-index:5;
      touch-action:none;
    }

    /* ─── CANVAS ─── */
    canvas {
      display:block; position:fixed; top:0; left:0;
      width:100%; height:100dvh; height:100%; z-index:1;
    }

    /* ─── UI OVERLAY ─── */
    #ui {
      position:fixed; inset:0; z-index:10;
      pointer-events:none;
      display:flex; align-items:center; justify-content:center;
    }

    /* ─── MAGNETIC TEXT REVEAL ─── */
    .wp {
      position:absolute; width:90%; max-width:750px;
      text-align:center; pointer-events:none;
      opacity:0; transform:translateY(50px) scale(0.94);
      visibility:hidden;
      transition: opacity 1.4s cubic-bezier(0.16,1,0.3,1),
                  transform 1.4s cubic-bezier(0.16,1,0.3,1),
                  visibility 0s 1.4s,
                  filter 1.4s cubic-bezier(0.16,1,0.3,1);
      will-change: opacity, transform, filter;
      filter: blur(8px);
    }
    .wp.active {
      opacity:1; transform:translateY(0) scale(1);
      visibility:visible;
      filter: blur(0px);
      transition: opacity 1.4s cubic-bezier(0.16,1,0.3,1),
                  transform 1.4s cubic-bezier(0.16,1,0.3,1),
                  visibility 0s 0s,
                  filter 1.4s cubic-bezier(0.16,1,0.3,1);
    }
    /* Dark void behind text — opaque center, smooth fade */
    .wp::before {
      content:''; position:absolute;
      top:50%; left:50%; transform:translate(-50%,-50%);
      width:130%; height:160%; border-radius:50%;
      background:radial-gradient(ellipse at center,
        rgba(3,1,8,0.92) 0%,
        rgba(3,1,8,0.8) 20%,
        rgba(3,1,8,0.5) 40%,
        rgba(3,1,8,0.15) 60%,
        transparent 75%);
      pointer-events:none; z-index:-1;
    }
    .wp .label {
      font-size:0.65rem; letter-spacing:0.35em;
      text-transform:uppercase; margin-bottom:18px; opacity:0;
      transform: translateY(10px);
      transition: opacity 0.8s ease 0.15s, transform 0.8s cubic-bezier(0.16,1,0.3,1) 0.15s;
    }
    .wp.active .label { opacity:0.7; transform: translateY(0); }
    .wp h2 {
      font-family:'Space Grotesk',sans-serif;
      font-weight:400; line-height:1.15;
      margin-bottom:20px; letter-spacing:0.01em;
      transition: opacity 0.8s ease 0.15s, transform 0.8s cubic-bezier(0.16,1,0.3,1) 0.15s;
    }
    .wp p {
      font-weight:300; line-height:1.85;
      max-width:550px; margin:0 auto; opacity:0.7;
      transition: opacity 0.8s ease 0.25s;
    }
    .wp .tags {
      margin-top:18px;
      transition: opacity 0.8s ease 0.35s;
    }
    .wp .tag {
      display:inline-block; margin:4px; padding:5px 16px;
      border-radius:20px; font-size:0.62rem; letter-spacing:0.08em;
      border:1px solid rgba(168,192,255,0.1);
      color:rgba(168,192,255,0.4);
      transition: border-color 0.6s, color 0.6s, transform 0.6s, background 0.6s;
    }
    .wp.active .tag {
      border-color:rgba(168,192,255,0.2);
      color:rgba(168,192,255,0.6);
    }
    .wp.active .tag:hover {
      border-color:rgba(168,192,255,0.4);
      color:rgba(168,192,255,0.8);
      background:rgba(168,192,255,0.05);
      transform:translateY(-1px);
    }

    /* Hero waypoint — LARGE on desktop */
    .wp-0 h2 {
      font-size:clamp(2.8rem,8vw,6rem);
      background:linear-gradient(135deg,#a8c0ff 0%,#fff 40%,#ffd6a8 100%);
      -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
      animation: heroShimmer 6s ease infinite;
      background-size: 200% 200%;
      filter: drop-shadow(0 0 12px rgba(168,192,255,0.25));
    }
    @keyframes heroShimmer {
      0%,100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }
    .wp-0 p { font-size:clamp(1rem,2.5vw,1.25rem); }
    /* Standard waypoints — larger desktop text */
    .wp:not(.wp-0) h2 { font-size:clamp(1.8rem,5vw,3.2rem); color:#fff; font-weight:400; }
    .wp:not(.wp-0) p { font-size:clamp(0.9rem,2vw,1.1rem); }
    /* Accent colors per section */
    .wp-1 .label { color:#a8ffc0; }
    .wp-2 .label { color:#ffd6a8; }
    .wp-3 .label { color:#ffa8f0; }
    .wp-4 .label { color:#c0a8ff; }
    .wp-5 .label { color:#a8e8ff; }
    .wp-6 .label { color:#ffcfa8; }
    .wp-7 .label { color:#a8c0ff; }

    /* ─── COSMIC QUOTE OVERLAY ─── */
    #quote-overlay {
      position:fixed; inset:0; z-index:30;
      display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      background:rgba(3,1,8,0.92);
      pointer-events:none;
      transition: opacity 2s cubic-bezier(0.16,1,0.3,1);
    }
    #quote-overlay.gone { opacity:0; pointer-events:none; }
    .quote-text {
      max-width:520px; width:88%; text-align:center;
      font-size:clamp(0.82rem,2.2vw,1.05rem);
      font-style:italic; line-height:2;
      letter-spacing:0.03em;
      color:rgba(168,192,255,0.35);
      opacity:0; transform:translateY(16px);
      animation: qIn 3.5s cubic-bezier(0.16,1,0.3,1) 0.3s forwards;
    }
    .scroll-prompt {
      margin-top:40px; display:flex; flex-direction:column;
      align-items:center; gap:10px;
      opacity:0; animation: qIn 1.5s ease 3.5s forwards;
    }
    .scroll-prompt span {
      font-size:0.55rem; letter-spacing:0.35em;
      text-transform:uppercase; color:rgba(168,192,255,0.25);
    }
    .scroll-prompt .arrow {
      width:18px; height:18px;
      border-right:1px solid rgba(168,192,255,0.25);
      border-bottom:1px solid rgba(168,192,255,0.25);
      transform:rotate(45deg);
      animation: bounce 2.5s cubic-bezier(0.16,1,0.3,1) infinite;
    }
    @keyframes qIn { to { opacity:1; transform:translateY(0); } }
    @keyframes bounce {
      0%,100% { transform:rotate(45deg) translate(0,0); opacity:0.25; }
      50% { transform:rotate(45deg) translate(5px,5px); opacity:0.7; }
    }

    /* ─── PROGRESS DOTS — VERTICAL NAV ─── */
    #progress {
      position:fixed; right:24px; top:50%; transform:translateY(-50%);
      z-index:20; display:flex; flex-direction:column; gap:14px;
      pointer-events:auto;
    }
    .dot {
      width:6px; height:6px; border-radius:50%;
      border:1px solid rgba(168,192,255,0.15);
      background:transparent; cursor:pointer;
      transition:all 0.6s cubic-bezier(0.16,1,0.3,1); position:relative;
    }
    .dot:hover {
      border-color:rgba(168,192,255,0.5);
      transform: scale(1.5);
    }
    .dot.active {
      background:rgba(168,192,255,0.8);
      border-color:rgba(168,192,255,0.8);
      box-shadow:0 0 16px rgba(168,192,255,0.5), 0 0 4px rgba(168,192,255,0.8);
      transform: scale(1.3);
    }
    .dot .tip {
      position:absolute; right:20px; top:50%; transform:translateY(-50%);
      font-size:0.52rem; letter-spacing:0.12em; text-transform:uppercase;
      color:rgba(168,192,255,0.3); white-space:nowrap;
      opacity:0; transform:translateY(-50%) translateX(5px);
      transition:opacity 0.3s, transform 0.3s;
      pointer-events:none;
    }
    .dot:hover .tip { opacity:1; transform:translateY(-50%) translateX(0); }

    /* ─── SOUND TOGGLE ─── */
    #sound-btn {
      position:fixed; top:24px; right:24px; z-index:20;
      background:rgba(168,192,255,0.03); border:1px solid rgba(168,192,255,0.1);
      border-radius:50%; width:38px; height:38px;
      display:flex; align-items:center; justify-content:center;
      cursor:pointer; color:rgba(168,192,255,0.35);
      font-size:0.85rem; transition:all 0.5s cubic-bezier(0.16,1,0.3,1);
      backdrop-filter:blur(8px);
    }
    #sound-btn:hover {
      border-color:rgba(168,192,255,0.35);
      color:rgba(168,192,255,0.8);
      background:rgba(168,192,255,0.06);
    }

    /* ─── TOP LEFT BRAND ─── */
    #brand {
      position:fixed; top:18px; left:20px; z-index:20;
      pointer-events:none;
      opacity:0;
      animation: fadeInSlow 2s ease 1s forwards;
      display:flex; align-items:center; gap:12px;
      padding:10px 16px 10px 12px;
      border-radius:24px;
      background:radial-gradient(ellipse at 30% 50%,
        rgba(168,192,255,0.06) 0%,
        rgba(168,192,255,0.02) 60%,
        transparent 100%);
      border:1px solid rgba(168,192,255,0.08);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }
    #brand svg {
      width:34px; height:34px;
      filter: drop-shadow(0 0 8px rgba(168,192,255,0.4))
              drop-shadow(0 0 20px rgba(168,192,255,0.15));
    }
    #brand .brand-text {
      font-family:'Space Grotesk',sans-serif;
      font-size:0.6rem; letter-spacing:0.28em;
      text-transform:uppercase;
      color:rgba(200,213,240,0.55);
      text-shadow: 0 0 12px rgba(168,192,255,0.3);
    }
    @keyframes fadeInSlow { to { opacity:1; } }

    /* ─── BOTTOM STATUS BAR ─── */
    #status-bar {
      position:fixed; bottom:24px; left:28px; z-index:20;
      display:flex; gap:24px; align-items:center;
      pointer-events:none;
      opacity:0;
      animation: fadeInSlow 2s ease 1.5s forwards;
    }
    .status-item {
      font-size:0.5rem; letter-spacing:0.2em;
      text-transform:uppercase;
      color:rgba(168,192,255,0.2);
      font-family:'Space Grotesk',sans-serif;
    }
    .status-item span { color:rgba(168,192,255,0.45); }

    /* ─── SECTION PROGRESS LINE ─── */
    #section-progress {
      position:fixed; top:0; left:0; z-index:20;
      width:0%; height:1px;
      background:linear-gradient(90deg, transparent, rgba(168,192,255,0.4), transparent);
      transition: width 0.8s cubic-bezier(0.16,1,0.3,1);
      pointer-events:none;
    }

    /* ─── CONNECT SECTION ─── */
    .social-row {
      display:flex; gap:10px; justify-content:center;
      margin-top:22px; flex-wrap:wrap; pointer-events:auto;
    }
    .social-link {
      display:flex; align-items:center; gap:7px;
      padding:8px 16px; border:1px solid rgba(168,192,255,0.08);
      border-radius:30px; color:rgba(168,192,255,0.4);
      text-decoration:none; font-size:0.68rem;
      transition:all 0.5s cubic-bezier(0.16,1,0.3,1);
      backdrop-filter:blur(4px);
      background:rgba(168,192,255,0.02);
    }
    .social-link:hover {
      color:#fff; border-color:rgba(168,192,255,0.35);
      background:rgba(168,192,255,0.06);
      transform:translateY(-2px);
      box-shadow:0 4px 20px rgba(168,192,255,0.1);
    }
    .social-link svg { width:13px; height:13px; fill:currentColor; }

    .contact-form {
      max-width:380px; margin:18px auto 0; text-align:left; pointer-events:auto;
    }
    .fr { margin-bottom:12px; }
    .fr label {
      display:block; font-size:0.55rem; letter-spacing:0.12em;
      text-transform:uppercase; color:rgba(168,192,255,0.25); margin-bottom:4px;
    }
    .fr input, .fr textarea {
      width:100%; padding:10px 14px;
      background:rgba(168,192,255,0.02);
      border:1px solid rgba(168,192,255,0.06);
      border-radius:8px; color:#e0e6f0;
      font-family:'Inter',sans-serif; font-size:0.82rem; font-weight:300;
      outline:none; transition:all 0.5s cubic-bezier(0.16,1,0.3,1);
      backdrop-filter:blur(4px);
    }
    .fr input:focus, .fr textarea:focus {
      border-color:rgba(168,192,255,0.3);
      background:rgba(168,192,255,0.04);
      box-shadow:0 0 20px rgba(168,192,255,0.05);
    }
    .fr textarea { min-height:70px; resize:vertical; }
    .fr input::placeholder, .fr textarea::placeholder { color:rgba(168,192,255,0.12); }
    .send-btn {
      display:block; width:100%; padding:12px;
      background:rgba(168,192,255,0.04); border:1px solid rgba(168,192,255,0.12);
      border-radius:8px; color:rgba(168,192,255,0.6);
      font-family:'Inter',sans-serif; font-size:0.82rem;
      cursor:pointer; transition:all 0.5s cubic-bezier(0.16,1,0.3,1);
      letter-spacing:0.06em;
      backdrop-filter:blur(4px);
    }
    .send-btn:hover {
      background:rgba(168,192,255,0.1); border-color:rgba(168,192,255,0.35);
      color:#fff; box-shadow:0 4px 20px rgba(168,192,255,0.1);
    }
    .form-status { text-align:center; margin-top:8px; font-size:0.75rem; min-height:18px; }
    .form-status.ok { color:#a8ffc0; }
    .form-status.err { color:#ff8888; }

    /* ─── WARP OVERLAY ─── */
    #warp {
      position:fixed; inset:0; z-index:2;
      pointer-events:none; opacity:0;
      background:radial-gradient(ellipse at center, transparent 20%, rgba(168,192,255,0.04) 100%);
      transition: opacity 0.4s cubic-bezier(0.16,1,0.3,1);
    }

    /* ─── VIGNETTE ─── */
    #vignette {
      position:fixed; inset:0; z-index:3;
      pointer-events:none;
      background:radial-gradient(ellipse at center, transparent 55%, rgba(3,1,8,0.45) 100%);
    }

    /* ─── SCANLINES (subtle CRT feel) ─── */
    #scanlines {
      position:fixed; inset:0; z-index:4;
      pointer-events:none; opacity:0.03;
      background:repeating-linear-gradient(
        0deg, transparent, transparent 2px,
        rgba(168,192,255,0.03) 2px, rgba(168,192,255,0.03) 4px
      );
    }

    /* ─── PROJECT CARDS ─── */
    .projects-grid {
      display:grid; grid-template-columns:1fr 1fr;
      gap:14px; margin-top:22px; pointer-events:auto;
      max-width:560px; margin-left:auto; margin-right:auto;
    }
    .proj {
      display:flex; align-items:flex-start; gap:12px;
      padding:14px 16px;
      border:1px solid rgba(168,192,255,0.06);
      border-radius:12px;
      background:rgba(168,192,255,0.015);
      text-decoration:none; color:inherit;
      transition:all 0.6s cubic-bezier(0.16,1,0.3,1);
      position:relative; overflow:hidden;
      backdrop-filter:blur(4px);
    }
    .proj:hover {
      border-color:rgba(168,192,255,0.2);
      background:rgba(168,192,255,0.04);
      transform:translateY(-3px);
      box-shadow:0 8px 30px rgba(168,192,255,0.08);
    }
    .proj::before {
      content:''; position:absolute;
      top:0; left:0; right:0; height:1px;
      background:linear-gradient(90deg,transparent,var(--accent,rgba(168,192,255,0.3)),transparent);
      opacity:0; transition:opacity 0.6s cubic-bezier(0.16,1,0.3,1);
    }
    .proj:hover::before { opacity:1; }
    /* Hover glow effect */
    .proj::after {
      content:''; position:absolute; inset:0;
      background:radial-gradient(circle at var(--mx,50%) var(--my,50%), rgba(168,192,255,0.06) 0%, transparent 60%);
      opacity:0; transition:opacity 0.4s;
      pointer-events:none;
    }
    .proj:hover::after { opacity:1; }
    .proj-icon {
      font-size:1.6rem; flex-shrink:0; margin-top:2px;
    }
    .proj-info { flex:1; min-width:0; }
    .proj-info h4 {
      font-family:'Space Grotesk',sans-serif;
      font-size:0.82rem; font-weight:500; color:#fff;
      margin-bottom:4px; line-height:1.3;
    }
    .proj-info p {
      font-size:0.68rem; line-height:1.5;
      color:rgba(168,192,255,0.4); opacity:1;
      margin:0;
    }
    .proj-badge {
      display:inline-block; margin-top:6px;
      font-size:0.55rem; letter-spacing:0.08em;
      text-transform:uppercase; padding:2px 8px;
      border-radius:10px;
    }
    .proj-badge.yt { background:rgba(255,0,0,0.1); color:rgba(255,100,100,0.65); }
    .proj-badge.gh { background:rgba(168,192,255,0.06); color:rgba(168,192,255,0.45); }

    @media (max-width:600px) {
      .projects-grid { grid-template-columns:1fr; max-width:320px; }
    }

    /* ─── FINALE ─── */
    .wp.wp-finale h2 {
      font-size:clamp(1.1rem,3vw,1.6rem);
      font-weight:300;
      font-style:italic;
      background:linear-gradient(135deg,rgba(168,192,255,0.6),rgba(255,214,168,0.5));
      -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
      line-height:1.8;
      letter-spacing:0.03em;
    }
    .wp.wp-finale .finale-line {
      width:50px; height:1px; margin:20px auto 0;
      background:linear-gradient(90deg,transparent,rgba(168,192,255,0.3),transparent);
    }
    .wp.wp-finale .finale-sig {
      margin-top:16px;

      tDiffuse: { value: null },
      uIntensity: { value: 0.0 },
      uTime: { value: 0.0 }
    },
    vertexShader: `
      varying vec2 vUv;
      void main() {
        vUv = uv;
        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
      }
    `,
    fragmentShader: `
      uniform sampler2D tDiffuse;
      uniform float uIntensity;
      uniform float uTime;
      varying vec2 vUv;
      void main() {
        vec2 dir = vUv - 0.5;
        float d = length(dir);
        float aberration = uIntensity * d * 0.02;
        float r = texture2D(tDiffuse, vUv + dir * aberration).r;
        float g = texture2D(tDiffuse, vUv).g;
        float b = texture2D(tDiffuse, vUv - dir * aberration).b;
        gl_FragColor = vec4(r, g, b, 1.0);

  const FilmGrainShader = {
    uniforms: {
      tDiffuse: { value: null },

      uGrainIntensity: { value: 0.04 },
      uVignetteIntensity: { value: 0.25 },

      uniform float uGrainIntensity;
      uniform float uVignetteIntensity;

      float random(vec2 co) {
        return fract(sin(dot(co.xy, vec2(12.9898, 78.233))) * 43758.5453);

      void main() {
        vec4 color = texture2D(tDiffuse, vUv);

        // Film grain

      <div class="fr"><label>Message</label><textarea id="c-msg" placeholder="Let's talk about..."></textarea></div>
      <button type="submit" class="send-btn" id="submit-btn">Send Message ✉</button>
      <div class="form-status" id="form-status"></div>
    </form>`;
  }

  function finaleHTML() {
    return `
      <h2>The universe is endless, and so is my journey.<br>Will keep building new horizons.</h2>
      <div class="finale-line"></div>
      <div class="finale-sig">— Nitin Ganneboina</div>
    `;
  }

  // ═══════════════════════════════════════
  // PERFORMANCE TIER DETECTION
  // ═══════════════════════════════════════
  const isMobile = /Android|iPhone|iPad|iPod|webOS|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent)
                   || (navigator.maxTouchPoints > 1 && innerWidth < 1024);
  const isLowEnd = isMobile && (navigator.hardwareConcurrency <= 4 || innerWidth < 500);

  // Performance multiplier — generous on mobile (modern phones have good GPUs)
  // The bottleneck is post-processing passes, not particle count
  const PERF = isMobile ? (isLowEnd ? 0.25 : 0.6) : 1.0;
  const TIER = isLowEnd ? 'LOW' : (isMobile ? 'MID' : 'HIGH');
  console.log(`[Cosmos] Performance tier: ${TIER}, multiplier: ${PERF}, mobile: ${isMobile}`);

  // ═══════════════════════════════════════
  // THREE.JS — ADAPTIVE SETUP
  // ═══════════════════════════════════════
  const scene = new THREE.Scene();
  scene.fog = new THREE.FogExp2(0x030108, 0.0012);
  const camera = new THREE.PerspectiveCamera(65, innerWidth/innerHeight, 0.1, 1000);
  const renderer = new THREE.WebGLRenderer({
    antialias: !isMobile,
    powerPreference: 'high-performance',
    alpha: false,
    stencil: false
  });
  renderer.setSize(innerWidth, innerHeight);
  renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
  renderer.setClearColor(0x030108);
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.25;
  renderer.outputColorSpace = THREE.SRGBColorSpace;
  document.body.prepend(renderer.domElement);

  // ═══════════════════════════════════════
  // POST-PROCESSING PIPELINE (adaptive)
  // ═══════════════════════════════════════
  const usePostProcessing = TIER !== 'LOW';
  let composer, bloomPass, chromaPass, filmPass;

  if (usePostProcessing) {
    composer = new EffectComposer(renderer);
    const renderPass = new RenderPass(scene, camera);
    composer.addPass(renderPass);

    // Bloom — disabled on low-end, reduced on mid
    bloomPass = new UnrealBloomPass(
      new THREE.Vector2(innerWidth, innerHeight),
      isMobile ? 0.5 : 0.55,
      isMobile ? 0.35 : 0.4,
      isMobile ? 0.35 : 0.3
    );
    composer.addPass(bloomPass);

    // Chromatic Aberration — desktop only
    if (!isMobile) {
      chromaPass = new ShaderPass(ChromaticAberrationShader);
      composer.addPass(chromaPass);
    }

    // Film Grain — desktop only
    if (!isMobile) {
      filmPass = new ShaderPass(FilmGrainShader);
      composer.addPass(filmPass);
    }
  }

  // ═══════════════════════════════════════
  // CAMERA PATH
  // ═══════════════════════════════════════
  const pts = WP.map(w => new THREE.Vector3(...w.pos));
  const entry = pts[0].clone().add(new THREE.Vector3(0,0,15));
  const exit = pts[N-1].clone().add(new THREE.Vector3(0,0,-15));
  const spline = new THREE.CatmullRomCurve3([entry,...pts,exit], false, 'catmullrom', 0.3);
  const wpT = WP.map((_,i) => (i+1)/(pts.length+1));

  // ═══════════════════════════════════════
  // MOUSE PARALLAX
  // ═══════════════════════════════════════
  let mouseX = 0, mouseY = 0;
  let smoothMouseX = 0, smoothMouseY = 0;
  let mouseNormX = 0, mouseNormY = 0;
  document.addEventListener('mousemove', (e) => {
    mouseX = (e.clientX / innerWidth - 0.5) * 2;
    mouseY = (e.clientY / innerHeight - 0.5) * 2;
    mouseNormX = e.clientX / innerWidth;
    mouseNormY = e.clientY / innerHeight;
  });

  // Gyroscope parallax on mobile — tilt phone to look around
  if (isMobile && window.DeviceOrientationEvent) {
    let gyroPermission = false;
    // iOS 13+ requires permission
    const requestGyro = () => {
      if (typeof DeviceOrientationEvent.requestPermission === 'function') {
        DeviceOrientationEvent.requestPermission().then(state => {
          if (state === 'granted') gyroPermission = true;
        }).catch(()=>{});
      } else {
        gyroPermission = true;
      }
    };
    // Request on first touch
    document.addEventListener('touchstart', function gyroInit() {
      requestGyro();
      document.removeEventListener('touchstart', gyroInit);
    }, { once: true });

    window.addEventListener('deviceorientation', (e) => {
      if (!gyroPermission && typeof DeviceOrientationEvent.requestPermission === 'function') return;
      const gamma = (e.gamma || 0) / 45; // left/right tilt, -1 to 1
      const beta = ((e.beta || 0) - 45) / 45; // front/back tilt, normalize around 45°
      mouseX = Math.max(-1, Math.min(1, gamma)) * 1.5;
      mouseY = Math.max(-1, Math.min(1, beta)) * 1.0;
    });
  }

  // ═══════════════════════════════════════
  // STARS — ADVANCED SHADER PARTICLES
  // ═══════════════════════════════════════
  function mkStars(count, spread, sRange, bright) {
    const g = new THREE.BufferGeometry();
    const p = new Float32Array(count*3), s = new Float32Array(count), sd = new Float32Array(count);
    const colors = new Float32Array(count*3);
    for (let i=0; i<count; i++) {
      const t = Math.random();
      const pp = spline.getPointAt(t);
      p[i*3]=pp.x+(Math.random()-.5)*spread;
      p[i*3+1]=pp.y+(Math.random()-.5)*spread;
      p[i*3+2]=pp.z+(Math.random()-.5)*spread;
      s[i]=sRange[0]+Math.random()*(sRange[1]-sRange[0]);
      sd[i]=Math.random()*6.28;
      const temp = Math.random();
      if (temp < 0.25) {
        colors[i*3]=0.75; colors[i*3+1]=0.85; colors[i*3+2]=1.0;
      } else if (temp < 0.5) {
        colors[i*3]=1.0; colors[i*3+1]=0.95; colors[i*3+2]=0.9;
      } else if (temp < 0.75) {
        colors[i*3]=0.6; colors[i*3+1]=0.7; colors[i*3+2]=1.0;
      } else if (temp < 0.92) {
        colors[i*3]=1.0; colors[i*3+1]=0.8; colors[i*3+2]=0.6;
      } else {
        // Rare bright colored stars
        const hue = Math.random();
        if (hue < 0.33) { colors[i*3]=1.0; colors[i*3+1]=0.4; colors[i*3+2]=0.4; }
        else if (hue < 0.66) { colors[i*3]=0.4; colors[i*3+1]=1.0; colors[i*3+2]=0.6; }
        else { colors[i*3]=0.6; colors[i*3+1]=0.4; colors[i*3+2]=1.0; }
        s[i] *= 1.5;
      }
    }
    g.setAttribute('position', new THREE.Float32BufferAttribute(p,3));
    g.setAttribute('size', new THREE.Float32BufferAttribute(s,1));
    g.setAttribute('seed', new THREE.Float32BufferAttribute(sd,1));
    g.setAttribute('color', new THREE.Float32BufferAttribute(colors,3));
    const m = new THREE.ShaderMaterial({
      uniforms:{
        uTime:{value:0}, uBright:{value:bright}, uSpeed:{value:0},
        uMouse:{value: new THREE.Vector2(0,0)},
        uResolution:{value: new THREE.Vector2(innerWidth, innerHeight)}
      },
      vertexShader:`
        attribute float size;
        attribute float seed;
        attribute vec3 color;
        uniform float uTime, uSpeed;
        varying float vA;
        varying vec3 vColor;
        varying float vDist;
        void main(){
          vColor = color;
          vec4 mv = modelViewMatrix * vec4(position,1.0);
          vDist = -mv.z;
          // Stretch stars during warp
          float stretch = 1.0 + uSpeed * ${isMobile ? '12.0' : '8.0'};
          gl_PointSize = size * stretch * (${isMobile ? '160.0' : '130.0'} / -mv.z);
          gl_Position = projectionMatrix * mv;
          // Twinkle with multiple frequencies for organic feel
          float twinkle1 = sin(uTime*0.4+seed) * 0.5 + 0.5;
          float twinkle2 = sin(uTime*1.1+seed*2.3) * 0.5 + 0.5;
          float twinkle3 = sin(uTime*0.15+seed*0.7) * 0.5 + 0.5;
          vA = 0.3 + 0.7 * (twinkle1 * 0.5 + twinkle2 * 0.3 + twinkle3 * 0.2);
        }`,
      fragmentShader:`
        uniform float uBright, uSpeed;
        varying float vA;
        varying vec3 vColor;
        varying float vDist;
        void main(){
          vec2 uv = gl_PointCoord - 0.5;
          // Stretch UV during warp for streak effect
          float d = length(vec2(uv.x, uv.y * (1.0 + uSpeed*${isMobile ? '10.0' : '6.0'}))) * 2.0;
          if(d > 1.0) discard;

          // Beautiful star: bright core + warm glow + soft aura
          float core = exp(-d*d*14.0);           // bright sharp center
          float glow = exp(-d*d*4.0) * 0.3;      // warm inner glow
          float aura = exp(-d*d*1.2) * 0.06;     // faint outer halo
          float a = (core + glow + aura) * vA * uBright;

          // Warp brightening
          a += uSpeed * 0.18;

          // Subtle warm shift on the glow
          vec3 col = mix(vColor, vec3(0.7, 0.8, 1.0), aura * 0.4);

          gl_FragColor = vec4(col, a);
        }`,
      transparent:true, depthWrite:false, blending:THREE.AdditiveBlending,
    });
    return { points:new THREE.Points(g,m), mat:m };
  }

  // Stars — immersive cosmos, tuned per tier
  // Mobile stars need to be BIGGER (screens are smaller) and still dense
  const close = mkStars(
    Math.floor((isMobile ? 200 : 350) * PERF), 25,
    isMobile ? [1.0, 3.5] : [0.6, 2.8], 0.7
  );
  const near = mkStars(
    Math.floor((isMobile ? 1200 : 2200) * PERF), 65,
    isMobile ? [0.4, 2.2] : [0.25, 1.8], 0.55
  );
  const far = mkStars(
    Math.floor((isMobile ? 2500 : 4500) * PERF), 280,
    isMobile ? [0.15, 0.9] : [0.1, 0.7], 0.22
  );
  const dust = TIER !== 'LOW' ? mkStars(
    Math.floor((isMobile ? 600 : 1200) * PERF), 180,
    [0.05, 0.2], 0.06
  ) : null;
  scene.add(close.points); scene.add(near.points); scene.add(far.points);
  if (dust) scene.add(dust.points);

  // ═══════════════════════════════════════
  // FOREGROUND DRIFT PARTICLES — "I'm in space" layer
  // Large, soft, slowly drifting particles around the camera
  // ═══════════════════════════════════════
  const driftCount = Math.floor((isMobile ? 40 : 60) * PERF);
  const driftGeo = new THREE.BufferGeometry();
  const driftPositions = new Float32Array(driftCount * 3);
  const driftSeeds = new Float32Array(driftCount);
  const driftSizes = new Float32Array(driftCount);
  for (let i = 0; i < driftCount; i++) {
    driftSeeds[i] = Math.random() * 100;
    driftSizes[i] = 3 + Math.random() * 8;
    // Initial positions don't matter — updated every frame
    driftPositions[i*3] = 0;
    driftPositions[i*3+1] = 0;
    driftPositions[i*3+2] = 0;
  }
  driftGeo.setAttribute('position', new THREE.Float32BufferAttribute(driftPositions, 3));
  driftGeo.setAttribute('seed', new THREE.Float32BufferAttribute(driftSeeds, 1));
  driftGeo.setAttribute('size', new THREE.Float32BufferAttribute(driftSizes, 1));
  const driftMat = new THREE.ShaderMaterial({
    uniforms: { uTime: { value: 0 } },
    vertexShader: `
      attribute float seed;
      attribute float size;
      uniform float uTime;
      varying float vA;
      void main() {
        vec4 mv = modelViewMatrix * vec4(position, 1.0);
        float dist = -mv.z;
        // Fade: visible only when close
        vA = smoothstep(14.0, 2.0, dist) * (${isMobile ? '0.14' : '0.1'} + 0.1 * sin(uTime * 0.5 + seed));
        gl_PointSize = size * (${isMobile ? '160.0' : '120.0'} / max(dist, 0.5));
        gl_Position = projectionMatrix * mv;
      }
    `,
    fragmentShader: `
      varying float vA;
      void main() {
        float d = length(gl_PointCoord - 0.5) * 2.0;
        if (d > 1.0) discard;
        float a = exp(-d*d*3.0) * vA;
        gl_FragColor = vec4(0.65, 0.75, 1.0, a);
      }
    `,
    transparent: true, depthWrite: false, blending: THREE.AdditiveBlending
  });
  const driftPoints = new THREE.Points(driftGeo, driftMat);
  scene.add(driftPoints);

  // ═══════════════════════════════════════
  // INTERACTIVE NEBULA SYSTEM — GPU Particles
  // ═══════════════════════════════════════
  function createNebula(position, color, size) {
    const nebulaGeo = new THREE.BufferGeometry();
    const count = Math.floor(200 * PERF);
    const positions = new Float32Array(count * 3);
    const seeds = new Float32Array(count);
    const sizes = new Float32Array(count);

    for (let i = 0; i < count; i++) {
      const theta = Math.random() * Math.PI * 2;
      const phi = Math.acos(2 * Math.random() - 1);
      const r = Math.random() * size;
      positions[i*3] = position.x + r * Math.sin(phi) * Math.cos(theta);
      positions[i*3+1] = position.y + r * Math.sin(phi) * Math.sin(theta);
      positions[i*3+2] = position.z + r * Math.cos(phi);
      seeds[i] = Math.random() * 6.28;
      sizes[i] = 2 + Math.random() * 6;
    }

    nebulaGeo.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
    nebulaGeo.setAttribute('seed', new THREE.Float32BufferAttribute(seeds, 1));
    nebulaGeo.setAttribute('size', new THREE.Float32BufferAttribute(sizes, 1));

    const col = new THREE.Color(color);
    const nebulaMat = new THREE.ShaderMaterial({
      uniforms: {
        uTime: { value: 0 },
        uColor: { value: new THREE.Vector3(col.r, col.g, col.b) },
        uCamPos: { value: new THREE.Vector3() },
        uProximity: { value: 0 }
      },
      vertexShader: `
        attribute float seed;
        attribute float size;
        uniform float uTime;
        uniform float uProximity;
        varying float vAlpha;
        varying float vSeed;
        void main() {
          vSeed = seed;
          vec3 pos = position;
          // Gentle drift
          pos.x += sin(uTime * 0.1 + seed * 3.0) * 1.5;
          pos.y += cos(uTime * 0.08 + seed * 2.0) * 1.2;
          pos.z += sin(uTime * 0.06 + seed * 4.0) * 0.8;

          vec4 mv = modelViewMatrix * vec4(pos, 1.0);
          float proximity = smoothstep(60.0, 10.0, -mv.z);
          vAlpha = (0.03 + proximity * 0.12 + uProximity * 0.08)
                   * (0.5 + 0.5 * sin(uTime * 0.2 + seed));
          gl_PointSize = size * (1.0 + proximity * 2.0) * (200.0 / -mv.z);
          gl_Position = projectionMatrix * mv;
        }
      `,
      fragmentShader: `
        uniform vec3 uColor;
        uniform float uTime;
        varying float vAlpha;
        varying float vSeed;
        void main() {
          vec2 uv = gl_PointCoord - 0.5;
          float d = length(uv) * 2.0;
          if (d > 1.0) discard;
          float a = exp(-d*d*1.5) * vAlpha;
          // Color breathing
          vec3 col = uColor * (0.8 + 0.2 * sin(uTime * 0.3 + vSeed));
          gl_FragColor = vec4(col, a);
        }
      `,
      transparent: true, depthWrite: false, blending: THREE.AdditiveBlending
    });

    const nebula = new THREE.Points(nebulaGeo, nebulaMat);
    scene.add(nebula);
    return { mesh: nebula, mat: nebulaMat };
  }

  const nebulae = [];
  // Nebulae on all tiers — they give depth and color to the cosmos
  WP.forEach((w, i) => {
    if (i === 0 || i === N-1) return;
    nebulae.push(createNebula(
      new THREE.Vector3(...w.pos),
      w.color,
      (isMobile ? 10 : 12) + Math.random() * 8
    ));
  });

  // ═══════════════════════════════════════
  // WAYPOINT ORBS — Volumetric Glow
  // ═══════════════════════════════════════
  function mkGlow(color, size) {
    const c=document.createElement('canvas');
    c.width=size||256; c.height=size||256;
    const x=c.getContext('2d');
    const half = c.width/2;
    const g=x.createRadialGradient(half,half,0,half,half,half);
    g.addColorStop(0,color); g.addColorStop(0.1,color+'ee');
    g.addColorStop(0.25,color+'88'); g.addColorStop(0.45,color+'33');
    g.addColorStop(0.65,color+'11'); g.addColorStop(1,'transparent');
    x.fillStyle=g; x.fillRect(0,0,c.width,c.height);
    const tex = new THREE.CanvasTexture(c);
    tex.needsUpdate = true;
    return tex;
  }

  const orbs = [];
  WP.forEach((w,i) => {
    const sz = i===0 ? 0.5 : 0.28;
    // Core sphere with emissive-like material
    const mesh = new THREE.Mesh(
      new THREE.SphereGeometry(sz,64,64),
      new THREE.MeshBasicMaterial({ color:new THREE.Color(w.color) })
    );
    mesh.position.set(...w.pos); scene.add(mesh);

    // Inner glow
    const gs = i===0 ? 5 : 3;
    const sp = new THREE.Sprite(new THREE.SpriteMaterial({
      map:mkGlow(w.color, 256), transparent:true, opacity:0.6,
      depthWrite:false, blending:THREE.AdditiveBlending
    }));
    sp.scale.set(gs,gs,1); sp.position.set(...w.pos); scene.add(sp);

    // Outer halo
    const gs2 = gs * 2.5;
    const sp2 = new THREE.Sprite(new THREE.SpriteMaterial({
      map:mkGlow(w.color, 256), transparent:true, opacity:0.08,
      depthWrite:false, blending:THREE.AdditiveBlending
    }));
    sp2.scale.set(gs2,gs2,1); sp2.position.set(...w.pos); scene.add(sp2);

    // Orbiting ring particles
    const ringGeo = new THREE.BufferGeometry();
    const ringCount = isMobile ? 12 : 30;
    const ringPos = new Float32Array(ringCount * 3);
    const ringSeed = new Float32Array(ringCount);
    const ringRadius = gs * 0.6;
    for (let j = 0; j < ringCount; j++) {
      const angle = (j / ringCount) * Math.PI * 2;
      ringPos[j*3] = w.pos[0] + Math.cos(angle) * ringRadius;
      ringPos[j*3+1] = w.pos[1] + Math.sin(angle) * ringRadius * 0.3;
      ringPos[j*3+2] = w.pos[2] + Math.sin(angle) * ringRadius;
      ringSeed[j] = Math.random() * 6.28;
    }
    ringGeo.setAttribute('position', new THREE.Float32BufferAttribute(ringPos, 3));
    ringGeo.setAttribute('seed', new THREE.Float32BufferAttribute(ringSeed, 1));
    const ringMat = new THREE.ShaderMaterial({
      uniforms: {
        uTime: { value: 0 },
        uColor: { value: new THREE.Color(w.color) },
        uCenter: { value: new THREE.Vector3(...w.pos) },
        uRadius: { value: ringRadius }
      },
      vertexShader: `
        attribute float seed;
        uniform float uTime;
        uniform vec3 uCenter;
        uniform float uRadius;
        varying float vA;
        void main() {
          float angle = seed + uTime * 0.3;
          vec3 pos = uCenter + vec3(
            cos(angle) * uRadius,
            sin(angle * 0.7) * uRadius * 0.3,
            sin(angle) * uRadius
          );
          vec4 mv = modelViewMatrix * vec4(pos, 1.0);
          gl_PointSize = 1.5 * (100.0 / -mv.z);
          gl_Position = projectionMatrix * mv;
          vA = 0.3 + 0.3 * sin(uTime + seed * 3.0);
        }
      `,
      fragmentShader: `
        uniform vec3 uColor;
        varying float vA;
        void main() {
          float d = length(gl_PointCoord - 0.5) * 2.0;
          if (d > 1.0) discard;
          float a = exp(-d*d*3.0) * vA;
          gl_FragColor = vec4(uColor, a);
        }
      `,
      transparent: true, depthWrite: false, blending: THREE.AdditiveBlending
    });
    const ringPoints = new THREE.Points(ringGeo, ringMat);
    scene.add(ringPoints);

    orbs.push({mesh, sp, sp2, gs, gs2, ringMat});
  });

  // Path line (subtle)
  const lp=[]; for(let i=0;i<=500;i++){const p=spline.getPointAt(i/500);lp.push(p.x,p.y,p.z);}
  const lg=new THREE.BufferGeometry(); lg.setAttribute('position',new THREE.Float32BufferAttribute(lp,3));
  scene.add(new THREE.Line(lg, new THREE.LineBasicMaterial({color:0x334477,transparent:true,opacity:0.04})));

  // ═══════════════════════════════════════
  // FLOATING GEOMETRY — Interactive 3D Elements (desktop/mid only)
  // ═══════════════════════════════════════
  const floatingGeo = [];
  const geoTypes = [
    new THREE.IcosahedronGeometry(isMobile ? 0.6 : 0.8, isMobile ? 0 : 1),
    new THREE.OctahedronGeometry(isMobile ? 0.5 : 0.6, 0),
    new THREE.TetrahedronGeometry(isMobile ? 0.4 : 0.5, 0),
    new THREE.TorusGeometry(isMobile ? 0.4 : 0.5, 0.15, isMobile ? 6 : 8, isMobile ? 12 : 32),
    new THREE.DodecahedronGeometry(isMobile ? 0.3 : 0.4, 0),
  ];

  WP.forEach((w, i) => {
    if (i === 0 || i === N-1) return;
    const geo = geoTypes[i % geoTypes.length];
    const mat = new THREE.MeshBasicMaterial({
      color: new THREE.Color(w.color),
      wireframe: true,
      transparent: true,
      opacity: 0.08,
    });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.set(
      w.pos[0] + (Math.random() - 0.5) * 12,
      w.pos[1] + (Math.random() - 0.5) * 6,
      w.pos[2] + (Math.random() - 0.5) * 8
    );
    mesh.scale.setScalar(1 + Math.random() * 2);
    scene.add(mesh);
    floatingGeo.push({ mesh, basePos: mesh.position.clone(), rotSpeed: 0.1 + Math.random() * 0.3, seed: Math.random() * 100 });
  });

  // ═══════════════════════════════════════
  // PARTICLE TRAIL — Enhanced
  // ═══════════════════════════════════════
  const TRAIL_N = isMobile ? 60 : 180;
  const trailGeo = new THREE.BufferGeometry();
  const trailPos = new Float32Array(TRAIL_N*3);
  const trailAlpha = new Float32Array(TRAIL_N);
  for(let i=0;i<TRAIL_N;i++) { trailAlpha[i]=1-i/TRAIL_N; }
  trailGeo.setAttribute('position', new THREE.Float32BufferAttribute(trailPos,3));
  trailGeo.setAttribute('alpha', new THREE.Float32BufferAttribute(trailAlpha,1));
  const trailMat = new THREE.ShaderMaterial({
    uniforms: { uSpeed:{value:0}, uTime:{value:0} },
    vertexShader:`
      attribute float alpha;
      varying float vA;
      uniform float uSpeed;
      void main(){
        vA = alpha * uSpeed;
        vec4 mv = modelViewMatrix * vec4(position,1.0);
        gl_PointSize = (3.0 + uSpeed*6.0) * (120.0/-mv.z);
        gl_Position = projectionMatrix * mv;
      }`,
    fragmentShader:`
      varying float vA;
      uniform float uTime;
      void main(){
        float d=length(gl_PointCoord-0.5)*2.0;
        if(d>1.0) discard;
        float core = exp(-d*d*4.0) * vA * 0.5;
        float glow = exp(-d*d*1.5) * vA * 0.15;
        vec3 col = mix(vec3(0.65,0.75,1.0), vec3(0.8,0.6,1.0), vA);
        gl_FragColor = vec4(col, core + glow);
      }`,
    transparent:true, depthWrite:false, blending:THREE.AdditiveBlending,
  });
  const trailPoints = new THREE.Points(trailGeo, trailMat);
  scene.add(trailPoints);
  const trailHistory = [];
  for(let i=0;i<TRAIL_N;i++) trailHistory.push(new THREE.Vector3());

  // ═══════════════════════════════════════
  // WARP SPEED LINES — visible when scrolling fast
  // Creates the "hyperdrive" streak effect
  // ═══════════════════════════════════════
  const WARP_N = isMobile ? 80 : 120;
  const warpGeo = new THREE.BufferGeometry();
  const warpPos = new Float32Array(WARP_N * 3);
  const warpSeed = new Float32Array(WARP_N);
  for (let i = 0; i < WARP_N; i++) {
    warpSeed[i] = Math.random() * 100;
  }
  warpGeo.setAttribute('position', new THREE.Float32BufferAttribute(warpPos, 3));
  warpGeo.setAttribute('seed', new THREE.Float32BufferAttribute(warpSeed, 1));
  const warpLineMat = new THREE.ShaderMaterial({
    uniforms: { uTime: { value: 0 }, uSpeed: { value: 0 } },
    vertexShader: `
      attribute float seed;
      uniform float uTime, uSpeed;
      varying float vA;
      void main() {
        vec4 mv = modelViewMatrix * vec4(position, 1.0);
        float dist = -mv.z;
        // Only visible when moving fast
        vA = smoothstep(0.15, 0.6, uSpeed) * smoothstep(25.0, 3.0, dist) * 0.6;
        // Stretch into lines when moving
        float streak = 2.0 + uSpeed * 12.0;
        gl_PointSize = streak * (${isMobile ? '100.0' : '80.0'} / max(dist, 1.0));
        gl_Position = projectionMatrix * mv;
      }
    `,
    fragmentShader: `
      uniform float uSpeed;
      varying float vA;
      void main() {
        vec2 uv = gl_PointCoord - 0.5;
        // Stretch vertically into streaks
        float d = length(vec2(uv.x * 4.0, uv.y)) * 2.0;
        if (d > 1.0) discard;
        float a = exp(-d*d*3.0) * vA;
        vec3 col = mix(vec3(0.6, 0.7, 1.0), vec3(0.9, 0.95, 1.0), uSpeed);
        gl_FragColor = vec4(col, a);
      }
    `,
    transparent: true, depthWrite: false, blending: THREE.AdditiveBlending
  });
  const warpLinePoints = new THREE.Points(warpGeo, warpLineMat);
  scene.add(warpLinePoints);

  // ═══════════════════════════════════════
  // MOUSE REACTIVE PARTICLES
  // ═══════════════════════════════════════
  const mouseParticleCount = isMobile ? 0 : 50;
  const mouseGeo = new THREE.BufferGeometry();
  const mousePos = new Float32Array(mouseParticleCount * 3);
  const mouseSeed = new Float32Array(mouseParticleCount);
  for (let i = 0; i < mouseParticleCount; i++) {
    mouseSeed[i] = Math.random() * 6.28;
  }
  mouseGeo.setAttribute('position', new THREE.Float32BufferAttribute(mousePos, 3));
  mouseGeo.setAttribute('seed', new THREE.Float32BufferAttribute(mouseSeed, 1));
  const mouseMat = new THREE.ShaderMaterial({
    uniforms: { uTime: { value: 0 } },
    vertexShader: `
      attribute float seed;
      uniform float uTime;
      varying float vA;
      void main() {
        vec4 mv = modelViewMatrix * vec4(position, 1.0);
        gl_PointSize = 2.0 * (80.0 / max(-mv.z, 1.0));
        gl_Position = projectionMatrix * mv;
        vA = 0.2 + 0.3 * sin(uTime * 2.0 + seed * 5.0);
      }
    `,
    fragmentShader: `
      varying float vA;
      void main() {
        float d = length(gl_PointCoord - 0.5) * 2.0;
        if (d > 1.0) discard;
        float a = exp(-d*d*3.0) * vA;
        gl_FragColor = vec4(0.7, 0.8, 1.0, a);
      }
    `,
    transparent: true, depthWrite: false, blending: THREE.AdditiveBlending
  });
  const mousePoints = new THREE.Points(mouseGeo, mouseMat);
  if (mouseParticleCount > 0) scene.add(mousePoints);

  // ═══════════════════════════════════════
  // AUDIO SYSTEM
  // ═══════════════════════════════════════
  let audioCtx, masterGain, soundOn = false;
  let ambientGainNode, padGainNode, whooshGainNode, chimeGainNode;
  let padOscs = [], lastChimeWP = -1;

  const CHIME_NOTES = [392.00, 523.25, 659.25, 783.99, 1046.50, 880.00, 587.33, 698.46];

  function initAudio() {
    if(audioCtx) { audioCtx.resume(); return; }
    audioCtx = new (window.AudioContext||window.webkitAudioContext)();
    audioCtx.resume();

    masterGain = audioCtx.createGain();
    masterGain.gain.value = 0.6;
    masterGain.connect(audioCtx.destination);

    padGainNode = audioCtx.createGain();
    padGainNode.gain.value = 0;

    const reverbDelay1 = audioCtx.createDelay(1.0);
    reverbDelay1.delayTime.value = 0.12;
    const reverbGain1 = audioCtx.createGain();
    reverbGain1.gain.value = 0.25;
    const reverbDelay2 = audioCtx.createDelay(1.0);
    reverbDelay2.delayTime.value = 0.23;
    const reverbGain2 = audioCtx.createGain();
    reverbGain2.gain.value = 0.18;

    const padFilter = audioCtx.createBiquadFilter();
    padFilter.type = 'lowpass';
    padFilter.frequency.value = 600;
    padFilter.Q.value = 0.5;

    padGainNode.connect(padFilter);
    padFilter.connect(masterGain);
    padFilter.connect(reverbDelay1);
    reverbDelay1.connect(reverbGain1);
    reverbGain1.connect(masterGain);
    reverbGain1.connect(reverbDelay2);
    reverbDelay2.connect(reverbGain2);
    reverbGain2.connect(masterGain);

    const padFreqs = [
      { freq: 65.41, type: 'sine' },
      { freq: 98.00, type: 'sine' },
      { freq: 130.81, type: 'sine' },
      { freq: 164.81, type: 'sine' },
      { freq: 196.00, type: 'triangle' },
    ];

    padFreqs.forEach(({ freq, type }) => {
      const osc = audioCtx.createOscillator();
      osc.type = type;
      osc.frequency.value = freq;
      const oscGain = audioCtx.createGain();
      oscGain.gain.value = freq < 100 ? 0.15 : 0.06;
      osc.connect(oscGain);
      oscGain.connect(padGainNode);
      osc.start();
      padOscs.push({ osc, gain: oscGain, baseFreq: freq });
    });

    const lfo = audioCtx.createOscillator();
    lfo.frequency.value = 0.06;
    const lfoGain = audioCtx.createGain();
    lfoGain.gain.value = 2;
    lfo.connect(lfoGain);
    lfoGain.connect(padOscs[0].osc.frequency);
    lfo.start();

    const lfo2 = audioCtx.createOscillator();
    lfo2.frequency.value = 0.08;
    const lfoGain2 = audioCtx.createGain();
    lfoGain2.gain.value = 100;
    lfo2.connect(lfoGain2);
    lfoGain2.connect(padFilter.frequency);
    lfo2.start();

    whooshGainNode = audioCtx.createGain();
    whooshGainNode.gain.value = 0;

    const bufSize = audioCtx.sampleRate * 2;
    const buf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
    const data = buf.getChannelData(0);
    let b0=0,b1=0,b2=0,b3=0,b4=0,b5=0,b6=0;
    for(let i=0;i<bufSize;i++){
      const white = Math.random()*2-1;
      b0=0.99886*b0+white*0.0555179; b1=0.99332*b1+white*0.0750759;
      b2=0.96900*b2+white*0.1538520; b3=0.86650*b3+white*0.3104856;
      b4=0.55000*b4+white*0.5329522; b5=-0.7616*b5-white*0.0168980;
      data[i]=(b0+b1+b2+b3+b4+b5+b6+white*0.5362)*0.07;
      b6=white*0.115926;
    }
    const noise = audioCtx.createBufferSource();
    noise.buffer = buf; noise.loop = true;

    const whooshLP = audioCtx.createBiquadFilter();
    whooshLP.type = 'lowpass'; whooshLP.frequency.value = 400; whooshLP.Q.value = 0.3;
    const whooshHP = audioCtx.createBiquadFilter();
    whooshHP.type = 'highpass'; whooshHP.frequency.value = 80; whooshHP.Q.value = 0.3;

    noise.connect(whooshLP); whooshLP.connect(whooshHP);
    whooshHP.connect(whooshGainNode); whooshGainNode.connect(masterGain);
    noise.start();

    chimeGainNode = audioCtx.createGain();
    chimeGainNode.gain.value = 0.25;
    const chimeReverb1 = audioCtx.createDelay(1.0);
    chimeReverb1.delayTime.value = 0.18;
    const chimeReverbGain = audioCtx.createGain();
    chimeReverbGain.gain.value = 0.3;
    const chimeReverb2 = audioCtx.createDelay(1.0);
    chimeReverb2.delayTime.value = 0.35;
    const chimeReverbGain2 = audioCtx.createGain();
    chimeReverbGain2.gain.value = 0.15;

    chimeGainNode.connect(masterGain);
    chimeGainNode.connect(chimeReverb1);
    chimeReverb1.connect(chimeReverbGain);
    chimeReverbGain.connect(masterGain);
    chimeReverbGain.connect(chimeReverb2);
    chimeReverb2.connect(chimeReverbGain2);
    chimeReverbGain2.connect(masterGain);
  }

  function playChime(wpIndex) {
    if(!audioCtx || !soundOn || wpIndex === lastChimeWP) return;
    lastChimeWP = wpIndex;
    const freq = CHIME_NOTES[wpIndex % CHIME_NOTES.length];
    const now = audioCtx.currentTime;

    [
      { f: freq, vol: 0.12, decay: 3.0 },
      { f: freq * 2, vol: 0.04, decay: 2.0 },
      { f: freq * 1.5, vol: 0.02, decay: 1.5 },
    ].forEach(({ f, vol, decay }) => {
      const osc = audioCtx.createOscillator();
      osc.type = 'sine';
      osc.frequency.value = f;
      const env = audioCtx.createGain();
      env.gain.setValueAtTime(0, now);
      env.gain.linearRampToValueAtTime(vol, now + 0.05);
      env.gain.exponentialRampToValueAtTime(0.001, now + decay);
      osc.connect(env); env.connect(chimeGainNode);
      osc.start(now); osc.stop(now + decay + 0.5);
    });
  }

  function updateAudio(spd) {
    if(!audioCtx || !soundOn) return;
    const t = audioCtx.currentTime;
    padGainNode.gain.linearRampToValueAtTime(0.5 + spd * 0.3, t + 0.15);
    whooshGainNode.gain.linearRampToValueAtTime(spd * spd * 0.08, t + 0.1);
    padOscs.forEach(({ osc, baseFreq }) => {
      osc.frequency.linearRampToValueAtTime(baseFreq + spd * baseFreq * 0.03, t + 0.2);
    });
  }

  const soundBtn = document.getElementById('sound-btn');
  let audioStarted = false;
  function autoStartAudio() {
    if (audioStarted) return;
    audioStarted = true;
    initAudio();
    soundOn = true;
    soundBtn.textContent = '🔊';
    if (padGainNode) padGainNode.gain.linearRampToValueAtTime(0.5, audioCtx.currentTime + 1.5);
  }
  ['click','touchstart','wheel','keydown'].forEach(evt => {
    document.addEventListener(evt, autoStartAudio, { once: true, passive: true });
  });

  soundBtn.addEventListener('click', () => {
    if (!audioStarted) { autoStartAudio(); return; }
    soundOn = !soundOn;
    soundBtn.textContent = soundOn ? '🔊' : '🔇';
    if (soundOn && padGainNode) {
      audioCtx.resume();
      padGainNode.gain.linearRampToValueAtTime(0.5, audioCtx.currentTime + 0.5);
    } else if (!soundOn && padGainNode) {
      padGainNode.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.3);
      whooshGainNode.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.3);
    }
  });

  document.addEventListener('visibilitychange', () => {
    if (!audioCtx || !audioStarted) return;
    if (document.hidden) audioCtx.suspend();
    else if (soundOn) audioCtx.resume();
  });
  window.addEventListener('blur', () => { if (audioCtx && audioStarted) audioCtx.suspend(); });
  window.addEventListener('focus', () => { if (audioCtx && audioStarted && soundOn) audioCtx.resume(); });

  // ═══════════════════════════════════════
  // NAVIGATION — SNAP-TO-WAYPOINT
  // ═══════════════════════════════════════
  let prog = 0, tgt = 0;
  let velocity = 0;
  const touchLayer = document.getElementById('touch-layer');
  let scrollAccum = 0;
  const SCROLL_THRESHOLD = 6;
  let scrollDir = 0;
  let scrollTimeout = null;
  let targetWP = 0;

  function onWheel(e) {
    e.preventDefault();
    const dir = Math.sign(e.deltaY);
    if (dir !== scrollDir) { scrollAccum = 0; scrollDir = dir; }
    scrollAccum += 1;
    clearTimeout(scrollTimeout);
    scrollTimeout = setTimeout(() => { scrollAccum = 0; }, 300);
    if (scrollAccum >= SCROLL_THRESHOLD) {
      scrollAccum = 0;
      const nextWP = Math.max(0, Math.min(N-1, targetWP + dir));
      if (nextWP !== targetWP) { targetWP = nextWP; tgt = wpT[targetWP]; }
    }
  }
  window.addEventListener('wheel', onWheel, {passive:false});
  touchLayer.addEventListener('wheel', onWheel, {passive:false});

  // Touch: smooth continuous drag + snap to nearest waypoint on release
  let ty0=0, tyLast=0, swiping=false, touchVelocity=0;
  let touchDragTarget = tgt; // smooth target during drag
  const TOUCH_SENSITIVITY = 2.5; // how fast dragging moves through space
  const SNAP_THRESHOLD = 0.015; // snap to WP if within this range

  function handleTouchStart(e) {
    if(e.target.closest('input,textarea,button,a')) return;
    ty0 = e.touches[0].clientY;
    tyLast = ty0;
    swiping = true;
    touchVelocity = 0;
    touchDragTarget = tgt;
  }
  function handleTouchMove(e) {
    if(!swiping) return;
    if(e.target.closest('input,textarea')) return;
    e.preventDefault();
    const y = e.touches[0].clientY;
    const dy = tyLast - y; // positive = swipe up = move forward
    tyLast = y;

    // Smooth continuous movement — feels like flying through space
    const delta = (dy / innerHeight) * TOUCH_SENSITIVITY;
    touchDragTarget = Math.max(0, Math.min(1, touchDragTarget + delta));
    tgt = touchDragTarget;

    // Track velocity for momentum
    touchVelocity = delta;
  }
  function handleTouchEnd() {
    if (!swiping) return;
    swiping = false;

    // Add momentum
    const momentum = touchVelocity * 8;
    touchDragTarget = Math.max(0, Math.min(1, touchDragTarget + momentum));

    // Snap to nearest waypoint
    let nearestWP = 0, nearestDist = Infinity;
    wpT.forEach((w, i) => {
      const d = Math.abs(touchDragTarget - w);
      if (d < nearestDist) { nearestDist = d; nearestWP = i; }
    });
    targetWP = nearestWP;
    tgt = wpT[targetWP];
  }

  touchLayer.addEventListener('touchstart', handleTouchStart, {passive:true});
  touchLayer.addEventListener('touchmove', handleTouchMove, {passive:false});
  touchLayer.addEventListener('touchend', handleTouchEnd, {passive:true});
  document.addEventListener('touchstart', handleTouchStart, {passive:true});
  document.addEventListener('touchmove', handleTouchMove, {passive:false});
  document.addEventListener('touchend', handleTouchEnd, {passive:true});

  window.addEventListener('keydown', (e) => {
    const tag = e.target.tagName;
    if (tag === 'INPUT' || tag === 'TEXTAREA') return;
    if(e.key==='ArrowDown'||e.key===' ') {
      e.preventDefault();
      targetWP = Math.min(N-1, targetWP+1); tgt = wpT[targetWP];
    } else if(e.key==='ArrowUp') {
      e.preventDefault();
      targetWP = Math.max(0, targetWP-1); tgt = wpT[targetWP];
    }
  });

  // ═══════════════════════════════════════
  // LOADING
  // ═══════════════════════════════════════
  const loader = document.getElementById('loader');
  const loaderFill = document.getElementById('loader-fill');
  const loaderPercent = document.getElementById('loader-percent');
  let loaded = false;
  function fakeLoad() {
    let p=0;
    const iv = setInterval(()=>{
      p += 8 + Math.random()*12;
      if(p>=100) {
        p=100; clearInterval(iv);
        loaded=true;
        loader.classList.add('ready');
        setTimeout(()=>{ loader.classList.add('done'); }, 300);
      }
      loaderFill.style.width = p+'%';
      loaderPercent.textContent = Math.floor(p) + '%';
    }, 100);
  }
  fakeLoad();

  // ═══════════════════════════════════════
  // ANIMATION LOOP — Cinematic 60fps
  // ═══════════════════════════════════════
  const dots = document.querySelectorAll('.dot');
  const wpEls = WP.map((_,i)=>document.getElementById(`wp-${i}`));
  const warpEl = document.getElementById('warp');
  const quoteEl = document.getElementById('quote-overlay');
  const sectionProgress = document.getElementById('section-progress');
  const statusSection = document.getElementById('status-section');
  const statusDepth = document.getElementById('status-depth');
  let curWP=0, lastProg=0, lastTime=performance.now();
  let smoothSpeed = 0;

  const camPosSmooth = new THREE.Vector3();
  const camLookSmooth = new THREE.Vector3();
  let camInited = false;

  // Raycaster for mouse-reactive particles
  const raycaster = new THREE.Raycaster();
  const mouseVec = new THREE.Vector2();

  // Frame rate control — target 60fps everywhere for smooth experience
  const targetFrameTime = 0; // uncapped — let the browser manage it
  let lastFrameTime = 0;

  function tick() {
    requestAnimationFrame(tick);
    if(!loaded) return;

    const now = performance.now();

    // Frame rate limiter for mobile
    if (targetFrameTime && (now - lastFrameTime) < targetFrameTime) return;
    lastFrameTime = now;

    const dt = Math.min((now-lastTime)/1000, 0.05);
    lastTime = now;
    const t = now * 0.001;

    // Custom cursor (desktop only)
    if (!isMobile) updateCursor();

    // Smooth navigation — snappier on mobile for responsive feel
    const lerpFactor = 1 - Math.pow(isMobile ? 0.008 : 0.012, dt);
    prog += (tgt - prog) * lerpFactor;
    prog = Math.max(0, Math.min(1, prog));

    // Speed calculation
    const rawSpeed = Math.abs(prog - lastProg) / Math.max(dt, 0.001);
    smoothSpeed += (Math.min(rawSpeed * 6, 1) - smoothSpeed) * lerpFactor;
    lastProg = prog;

    // Mouse parallax
    smoothMouseX += (mouseX - smoothMouseX) * lerpFactor * 0.5;
    smoothMouseY += (mouseY - smoothMouseY) * lerpFactor * 0.5;

    // Camera — ultra-smooth
    const ct = Math.max(0.001, Math.min(0.999, prog));
    const targetPos = spline.getPointAt(ct);
    const lookTarget = spline.getPointAt(Math.min(ct+0.012, 0.999));
    targetPos.x += smoothMouseX * (isMobile ? 1.2 : 0.8);
    targetPos.y -= smoothMouseY * (isMobile ? 0.8 : 0.5);

    if (!camInited) {
      camPosSmooth.copy(targetPos);
      camLookSmooth.copy(lookTarget);
      camInited = true;
    }

    const camLerp = 1 - Math.pow(0.018, dt);
    camPosSmooth.lerp(targetPos, camLerp);
    camLookSmooth.lerp(lookTarget, camLerp);
    camera.position.copy(camPosSmooth);
    camera.lookAt(camLookSmooth);

    // Subtle camera roll + breathing
    const tan = spline.getTangentAt(ct);
    camera.rotation.z = -tan.x * (isMobile ? 0.1 : 0.06) + smoothMouseX * 0.02 + Math.sin(t * 0.3) * (isMobile ? 0.006 : 0.003);

    // Star uniforms
    // Foreground drift particles — orbit around camera
    const dp = driftGeo.attributes.position.array;
    for (let i = 0; i < driftCount; i++) {
      const s = driftSeeds[i];
      const radius = 4 + (s % 5) * 2;
      dp[i*3]   = camera.position.x + Math.sin(t * 0.08 + s * 1.3) * radius + Math.cos(t * 0.12 + s * 0.7) * 2;
      dp[i*3+1] = camera.position.y + Math.cos(t * 0.06 + s * 1.7) * radius * 0.6 + Math.sin(t * 0.1 + s) * 1.5;
      dp[i*3+2] = camera.position.z + Math.sin(t * 0.1 + s * 2.1) * radius + Math.cos(t * 0.07 + s * 1.1) * 3;
    }
    driftGeo.attributes.position.needsUpdate = true;
    driftMat.uniforms.uTime.value = t;

    close.mat.uniforms.uTime.value = t;
    close.mat.uniforms.uSpeed.value = smoothSpeed;
    near.mat.uniforms.uTime.value = t;
    near.mat.uniforms.uSpeed.value = smoothSpeed;
    far.mat.uniforms.uTime.value = t;
    far.mat.uniforms.uSpeed.value = smoothSpeed;
    if (dust) {
      dust.mat.uniforms.uTime.value = t;
      dust.mat.uniforms.uSpeed.value = smoothSpeed * 0.5;
    }

    // Nebula animation
    nebulae.forEach((n, i) => {
      n.mat.uniforms.uTime.value = t;
      n.mat.uniforms.uCamPos.value.copy(camera.position);
      const d = camera.position.distanceTo(new THREE.Vector3(...WP[i+1].pos));
      n.mat.uniforms.uProximity.value = Math.max(0, 1 - d / 30);
    });

    // Floating geometry
    floatingGeo.forEach((fg) => {
      fg.mesh.rotation.x = t * fg.rotSpeed * 0.3;
      fg.mesh.rotation.y = t * fg.rotSpeed * 0.5;
      fg.mesh.rotation.z = t * fg.rotSpeed * 0.2;
      // Gentle float
      fg.mesh.position.y = fg.basePos.y + Math.sin(t * 0.5 + fg.seed) * 0.8;
      fg.mesh.position.x = fg.basePos.x + Math.cos(t * 0.3 + fg.seed) * 0.5;
      // Fade based on distance
      const d = camera.position.distanceTo(fg.mesh.position);
      fg.mesh.material.opacity = Math.max(0, 0.12 - d * 0.002);
    });

    // Warp overlay
    warpEl.style.opacity = smoothSpeed * (isMobile ? 0.9 : 0.7);

    // Particle trail
    trailHistory.unshift(camera.position.clone().add(new THREE.Vector3(
      (Math.random()-.5)*0.3, (Math.random()-.5)*0.3, 0
    )));
    trailHistory.length = TRAIL_N;
    const tp = trailGeo.attributes.position.array;
    for(let i=0;i<TRAIL_N;i++){
      const h=trailHistory[i];
      if(h){tp[i*3]=h.x;tp[i*3+1]=h.y;tp[i*3+2]=h.z;}
    }
    trailGeo.attributes.position.needsUpdate=true;
    trailMat.uniforms.uSpeed.value = smoothSpeed;
    trailMat.uniforms.uTime.value = t;

    // Warp speed lines — spawn around camera when moving fast
    const wp = warpGeo.attributes.position.array;
    for (let i = 0; i < WARP_N; i++) {
      const s = warpSeed[i];
      const spread = 12;
      wp[i*3]   = camera.position.x + Math.sin(s * 7.3 + t * 0.02) * spread + (Math.random()-0.5) * 2;
      wp[i*3+1] = camera.position.y + Math.cos(s * 5.1 + t * 0.03) * spread * 0.5 + (Math.random()-0.5) * 2;
      wp[i*3+2] = camera.position.z + Math.sin(s * 3.7) * spread * 1.5 - 5;
    }
    warpGeo.attributes.position.needsUpdate = true;
    warpLineMat.uniforms.uTime.value = t;
    warpLineMat.uniforms.uSpeed.value = smoothSpeed;

    // Mouse-reactive particles — orbit around cursor in world space
    if (mouseParticleCount > 0) {
      const mp = mouseGeo.attributes.position.array;
      mouseVec.set(mouseNormX * 2 - 1, -(mouseNormY * 2 - 1));
      raycaster.setFromCamera(mouseVec, camera);
      const mouseWorldPos = raycaster.ray.at(8, new THREE.Vector3());
      for (let i = 0; i < mouseParticleCount; i++) {
        const angle = (i / mouseParticleCount) * Math.PI * 2 + t * 0.5;
        const r = 0.5 + Math.sin(t * 1.5 + mouseSeed[i] * 3) * 0.3;
        mp[i*3] = mouseWorldPos.x + Math.cos(angle) * r;
        mp[i*3+1] = mouseWorldPos.y + Math.sin(angle) * r;
        mp[i*3+2] = mouseWorldPos.z + Math.sin(angle * 0.5 + t) * r * 0.3;
      }
      mouseGeo.attributes.position.needsUpdate = true;
      mouseMat.uniforms.uTime.value = t;
    }

    // Pulse orbs
    orbs.forEach((o,i) => {
      const pulse = 1+0.15*Math.sin(t*1.2+i*1.7);
      o.sp.scale.setScalar(o.gs*pulse);
      o.sp2.scale.setScalar(o.gs2*(1+0.1*Math.sin(t*0.8+i*2.1)));
      const d = camera.position.distanceTo(o.mesh.position);
      const prox = Math.max(0, 1 - d/20);
      o.sp.material.opacity = 0.3 + prox * 0.45;
      o.sp2.material.opacity = 0.05 + prox * 0.1;
      o.ringMat.uniforms.uTime.value = t;
    });

    // Active waypoint
    let closest=0, cd=Infinity;
    wpT.forEach((w,i)=>{ const d=Math.abs(prog-w); if(d<cd){cd=d;closest=i;} });
    if (closest !== curWP) playChime(closest);
    curWP = closest;

    wpEls.forEach((el,i) => {
      el.classList.toggle('active', Math.abs(prog-wpT[i])<0.05);
    });
    dots.forEach((d,i) => d.classList.toggle('active', i===curWP));

    // Status bar updates
    statusSection.textContent = String(curWP + 1).padStart(2, '0');
    statusDepth.textContent = (prog * 100).toFixed(1);
    sectionProgress.style.width = (prog * 100) + '%';

    // Quote overlay
    if(prog>0.02) quoteEl.classList.add('gone');
    else quoteEl.classList.remove('gone');

    // Post-processing updates
    if (chromaPass) {
      chromaPass.uniforms.uIntensity.value = smoothSpeed * 3;
      chromaPass.uniforms.uTime.value = t;
    }
    if (filmPass) {
      filmPass.uniforms.uTime.value = t;
      filmPass.uniforms.uSpeed.value = smoothSpeed;
    }
    if (bloomPass) {
      bloomPass.strength = (isMobile ? 0.45 : 0.5) + smoothSpeed * (isMobile ? 0.8 : 1.0);
      bloomPass.radius = (isMobile ? 0.3 : 0.35) + smoothSpeed * 0.25;
    }

    // Audio
    updateAudio(smoothSpeed);

    // Render — via composer if available, direct otherwise
    if (composer) {
      composer.render();
    } else {
      renderer.render(scene, camera);
    }
  }
  tick();

  // Resize
  function onResize(){
    const w = innerWidth, h = innerHeight;
    camera.aspect = w/h;
    camera.updateProjectionMatrix();
    renderer.setSize(w, h);
    renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
    if (composer) composer.setSize(w, h);
    if (bloomPass) bloomPass.setSize(w, h);
    near.mat.uniforms.uResolution.value.set(w, h);
  }
  addEventListener('resize', onResize);
  addEventListener('orientationchange', ()=>setTimeout(onResize,200));
  if(visualViewport) visualViewport.addEventListener('resize', onResize);

  // Make handleSubmit global
  window.handleSubmit = handleSubmit;
  window.targetWP = targetWP;

  // ═══════════════════════════════════════
  // CONTACT FORM
  // ═══════════════════════════════════════
  const _p=['4c640b23','07af','4c37','b7df','c4a277e290f3'];
  document.getElementById('form-key').value=_p.join('-');
  let _ls=0;
  async function handleSubmit(e){
    e.preventDefault();
    const btn=document.getElementById('submit-btn');
    const st=document.getElementById('form-status');
    if(Date.now()-_ls<30000){st.textContent='Please wait.';st.className='form-status err';return;}
    if(document.getElementById('_hp').value)return;
    btn.textContent='Sending...';btn.disabled=true;st.textContent='';
    try{
      const r=await fetch('https://api.web3forms.com/submit',{
        method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({
          access_key:document.getElementById('form-key').value,
          name:document.getElementById('c-name').value,
          email:document.getElementById('c-email').value,
          message:document.getElementById('c-msg').value,
          subject:'New message from nitinganneboina.com',botcheck:''
        })
      });
      const d=await r.json();
      if(d.success){st.textContent='✓ Sent!';st.className='form-status ok';document.getElementById('contact-form').reset();_ls=Date.now();}
      else throw 0;
    }catch(err){st.textContent='Failed. Try again.';st.className='form-status err';}
    btn.textContent='Send Message ✉';btn.disabled=false;
  }

  </script>
