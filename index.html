<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Nitin Ganneboina | Finance Tech & AI Storytelling</title>
  <meta name="description" content="Transforming Finance through Tech. Exploring Stories through AI." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #030108;
      font-family: 'Inter', sans-serif;
      color: #c8d5f0;
      -webkit-font-smoothing: antialiased;
      scrollbar-width: none;
    }
    html::-webkit-scrollbar { display: none; }
    body { cursor: default; touch-action: none; }

    canvas { display: block; position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; }

    /* ─── OVERLAY UI ─── */
    #ui {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      z-index: 10; pointer-events: none;
      display: flex; align-items: center; justify-content: center;
    }

    /* ─── WAYPOINT TEXT ─── */
    .waypoint-text {
      position: absolute;
      width: 90%;
      max-width: 700px;
      text-align: center;
      opacity: 0;
      transform: translateY(20px);
      transition: opacity 0.8s ease, transform 0.8s ease;
      pointer-events: none;
    }
    .waypoint-text.active {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }
    .waypoint-text .label {
      font-size: 0.7rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      margin-bottom: 14px;
      opacity: 0.5;
    }
    .waypoint-text h2 {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 300;
      line-height: 1.15;
      margin-bottom: 18px;
      letter-spacing: 0.01em;
    }
    .waypoint-text p {
      font-weight: 300;
      line-height: 1.7;
      max-width: 520px;
      margin: 0 auto;
      opacity: 0.6;
    }
    .waypoint-text .tags {
      margin-top: 16px;
    }
    .waypoint-text .tag {
      display: inline-block;
      margin: 3px 4px;
      padding: 4px 14px;
      border-radius: 20px;
      font-size: 0.65rem;
      letter-spacing: 0.06em;
      border: 1px solid rgba(168,192,255,0.15);
      color: rgba(168,192,255,0.5);
    }

    /* Responsive text sizes */
    .wp-hero h2 { font-size: clamp(2.4rem, 7vw, 5rem); }
    .wp-hero p { font-size: clamp(0.95rem, 2.5vw, 1.15rem); }
    .wp-standard h2 { font-size: clamp(1.6rem, 4.5vw, 2.8rem); }
    .wp-standard p { font-size: clamp(0.85rem, 2vw, 1rem); }

    /* Color accents per waypoint */
    .wp-0 h2 { background: linear-gradient(135deg, #a8c0ff, #ffffff 50%, #ffd6a8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .wp-1 .label { color: #a8ffc0; }
    .wp-1 h2 { color: #fff; }
    .wp-2 .label { color: #ffd6a8; }
    .wp-2 h2 { color: #fff; }
    .wp-3 .label { color: #ffa8f0; }
    .wp-3 h2 { color: #fff; }
    .wp-4 .label { color: #c0a8ff; }
    .wp-4 h2 { color: #fff; }
    .wp-5 .label { color: #a8e8ff; }
    .wp-5 h2 { color: #fff; }
    .wp-6 .label { color: #a8c0ff; }
    .wp-6 h2 { color: #fff; }

    /* ─── SCROLL HINT ─── */
    #scroll-hint {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 20;
      text-align: center;
      opacity: 0;
      animation: fadeIn 1.5s ease 2s forwards;
      pointer-events: none;
      transition: opacity 0.6s;
    }
    #scroll-hint.hidden { opacity: 0 !important; }
    #scroll-hint span {
      display: block;
      font-size: 0.65rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: rgba(168,192,255,0.35);
      margin-bottom: 8px;
    }
    .scroll-arrow {
      width: 20px; height: 20px;
      border-right: 1px solid rgba(168,192,255,0.3);
      border-bottom: 1px solid rgba(168,192,255,0.3);
      transform: rotate(45deg);
      margin: 0 auto;
      animation: scrollBounce 2s ease infinite;
    }
    @keyframes scrollBounce {
      0%, 100% { transform: rotate(45deg) translate(0,0); opacity: 0.3; }
      50% { transform: rotate(45deg) translate(4px,4px); opacity: 0.8; }
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    /* ─── PROGRESS DOTS ─── */
    #progress {
      position: fixed;
      right: 24px;
      top: 50%;
      transform: translateY(-50%);
      z-index: 20;
      display: flex;
      flex-direction: column;
      gap: 14px;
      pointer-events: auto;
    }
    .prog-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      border: 1px solid rgba(168,192,255,0.25);
      background: transparent;
      cursor: pointer;
      transition: all 0.4s ease;
      position: relative;
    }
    .prog-dot.active {
      background: rgba(168,192,255,0.8);
      border-color: rgba(168,192,255,0.8);
      box-shadow: 0 0 12px rgba(168,192,255,0.4);
    }
    .prog-dot .prog-label {
      position: absolute;
      right: 20px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 0.6rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(168,192,255,0.4);
      white-space: nowrap;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
    }
    .prog-dot:hover .prog-label { opacity: 1; }

    /* ─── CONNECT SECTION (last waypoint) ─── */
    .social-row {
      display: flex; gap: 12px; justify-content: center; margin-top: 24px;
      flex-wrap: wrap;
    }
    .social-link {
      display: flex; align-items: center; gap: 6px;
      padding: 8px 16px;
      border: 1px solid rgba(168,192,255,0.12);
      border-radius: 30px;
      color: rgba(168,192,255,0.5);
      text-decoration: none;
      font-size: 0.75rem;
      transition: all 0.3s;
      pointer-events: auto;
    }
    .social-link:hover {
      color: #fff;
      border-color: rgba(168,192,255,0.4);
      background: rgba(168,192,255,0.06);
    }
    .social-link svg { width: 14px; height: 14px; fill: currentColor; flex-shrink: 0; }

    /* Contact form */
    .contact-form {
      max-width: 400px; margin: 20px auto 0; text-align: left;
      pointer-events: auto;
    }
    .form-row { margin-bottom: 12px; }
    .form-row label {
      display: block; font-size: 0.65rem; letter-spacing: 0.1em;
      text-transform: uppercase; color: rgba(168,192,255,0.35); margin-bottom: 4px;
    }
    .form-row input, .form-row textarea {
      width: 100%; padding: 10px 14px;
      background: rgba(168,192,255,0.04);
      border: 1px solid rgba(168,192,255,0.1);
      border-radius: 8px; color: #e0e6f0;
      font-family: 'Inter', sans-serif; font-size: 0.85rem; font-weight: 300;
      outline: none; transition: border-color 0.3s;
    }
    .form-row input:focus, .form-row textarea:focus { border-color: rgba(168,192,255,0.35); }
    .form-row textarea { min-height: 80px; resize: vertical; }
    .form-row input::placeholder, .form-row textarea::placeholder { color: rgba(168,192,255,0.18); }
    .send-btn {
      display: block; width: 100%; padding: 12px;
      background: rgba(168,192,255,0.08);
      border: 1px solid rgba(168,192,255,0.2);
      border-radius: 8px; color: rgba(168,192,255,0.8);
      font-family: 'Inter', sans-serif; font-size: 0.85rem;
      cursor: pointer; transition: all 0.3s; letter-spacing: 0.05em;
      pointer-events: auto;
    }
    .send-btn:hover { background: rgba(168,192,255,0.14); border-color: rgba(168,192,255,0.4); color: #fff; }
    .form-status { text-align: center; margin-top: 10px; font-size: 0.8rem; min-height: 20px; }
    .form-status.success { color: #a8ffc0; }
    .form-status.error { color: #ff8888; }

    /* ─── MOBILE ─── */
    @media (max-width: 768px) {
      #progress { right: 12px; gap: 10px; }
      .prog-dot { width: 6px; height: 6px; }
      .prog-dot .prog-label { display: none; }
      .social-row { flex-direction: column; align-items: center; }
      .contact-form { max-width: 90%; }
    }
    @media (max-width: 480px) {
      .waypoint-text { width: 92%; }
    }
  </style>
</head>
<body>

  <!-- UI Overlay -->
  <div id="ui">
    <!-- Waypoint texts injected by JS -->
  </div>

  <!-- Scroll hint -->
  <div id="scroll-hint">
    <span>Scroll to explore</span>
    <div class="scroll-arrow"></div>
  </div>

  <!-- Progress dots -->
  <div id="progress"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script>
  (function() {
    'use strict';

    // ═══════════════════════════════════════
    // WAYPOINT DATA
    // ═══════════════════════════════════════
    const waypoints = [
      {
        label: '',
        title: 'Nitin Ganneboina',
        desc: 'Transforming Finance through Tech. Exploring Stories through AI. I stay calm when the world panics.',
        tags: [],
        pos: [0, 0, 0],
        color: '#a8c0ff',
        heroClass: 'wp-hero',
        progLabel: 'Start',
      },
      {
        label: 'What I Build',
        title: 'Finance Transformation',
        desc: 'Leading development teams to build invoicing and reconciliation platforms for major financial institutions. My work isn\'t just code — it\'s translating complex financial needs into efficient, working software.',
        tags: ['FinTech', 'Enterprise', 'Platforms', 'Leadership'],
        pos: [14, 5, -35],
        color: '#a8ffc0',
        progLabel: 'Finance',
      },
      {
        label: 'My Superpower',
        title: 'Calm in the Chaos',
        desc: 'Software development is rarely a straight line. When high-pressure situations hit — critical bugs, tight deadlines — I don\'t panic. My strength lies in slowing down, thinking rationally, and guiding my team through the panic zone to the right solution.',
        tags: ['Resilience', 'Problem Solving', 'Team Leadership'],
        pos: [-10, 13, -70],
        color: '#ffd6a8',
        progLabel: 'Superpower',
      },
      {
        label: 'The Creative Frontier',
        title: 'AI Storytelling',
        desc: 'Deep-diving into Generative AI, using tools like Google Veo and Flow to produce video content. I love taking a raw idea — a story, a rhyme — and visualizing it on screen. Creator at heart.',
        tags: ['Generative AI', 'Google Veo', 'Video', 'Creativity'],
        pos: [12, -4, -110],
        color: '#ffa8f0',
        progLabel: 'Creative',
      },
      {
        label: 'Expanding the Toolkit',
        title: 'Building the Future',
        desc: 'Expanding my technical frontier by building AI-driven products — experimenting with everything from autonomous agents to SaaS applications. Managing product roadmaps while pushing what\'s possible.',
        tags: ['AI/ML', 'SaaS', 'Agents', 'Product Management'],
        pos: [-14, 8, -150],
        color: '#c0a8ff',
        progLabel: 'Future',
      },
      {
        label: 'Beyond Work',
        title: 'The Explorer',
        desc: 'Currently reading "Four Agreements" by Don Miguel Ruiz and "Caraka Samhita" — ancient Ayurvedic wisdom. Passionate about cricket, badminton, history, culture, space tech, and deep conversations about anything.',
        tags: ['Books', 'Cricket', 'History', 'Space Tech', 'Ayurveda'],
        pos: [8, -8, -190],
        color: '#a8e8ff',
        progLabel: 'Explorer',
      },
      {
        label: 'Let\'s Talk',
        title: 'Connect With Me',
        desc: 'I thrive on deep 1-on-1 conversations. Tech side: Process Efficiency, AI Agents, Space Tech, Financial Systems. Human side: Cricket, Badminton, History & Culture, Podcasts. No sales. Just talk.',
        tags: [],
        pos: [0, 2, -230],
        color: '#a8c0ff',
        progLabel: 'Connect',
        isConnect: true,
      },
    ];

    const totalWaypoints = waypoints.length;

    // ═══════════════════════════════════════
    // GENERATE UI
    // ═══════════════════════════════════════
    const ui = document.getElementById('ui');
    const progressEl = document.getElementById('progress');

    waypoints.forEach((wp, i) => {
      // Waypoint text
      const div = document.createElement('div');
      div.className = `waypoint-text ${i === 0 ? 'wp-hero' : 'wp-standard'} wp-${i}`;
      div.id = `wp-${i}`;
      let html = '';
      if (wp.label) html += `<div class="label">${wp.label}</div>`;
      html += `<h2>${wp.title}</h2>`;
      html += `<p>${wp.desc}</p>`;
      if (wp.tags.length) html += `<div class="tags">${wp.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>`;
      if (wp.isConnect) {
        html += `
          <div class="social-row">
            <a href="https://github.com/nitinms-ftw" target="_blank" rel="noopener" class="social-link">
              <svg viewBox="0 0 24 24"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"/></svg>
              GitHub
            </a>
            <a href="https://www.linkedin.com/in/nitin-g-51778a8b" target="_blank" rel="noopener" class="social-link">
              <svg viewBox="0 0 24 24"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 01-2.063-2.065 2.064 2.064 0 112.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>
              LinkedIn
            </a>
            <a href="https://x.com/GanneboinaNitin" target="_blank" rel="noopener" class="social-link">
              <svg viewBox="0 0 24 24"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
              X / Twitter
            </a>
          </div>
          <form class="contact-form" id="contact-form" onsubmit="return handleSubmit(event)">
            <input type="hidden" name="access_key" value="" id="form-key" />
            <input type="text" name="_gotcha" id="_hp" style="display:none!important;position:absolute;left:-9999px;" tabindex="-1" autocomplete="off" />
            <div class="form-row">
              <label>Your Name</label>
              <input type="text" id="c-name" placeholder="Jane Doe" required />
            </div>
            <div class="form-row">
              <label>Your Email</label>
              <input type="email" id="c-email" placeholder="jane@example.com" required />
            </div>
            <div class="form-row">
              <label>Message</label>
              <textarea id="c-msg" placeholder="Let's talk about..."></textarea>
            </div>
            <button type="submit" class="send-btn" id="submit-btn">Send Message ✉</button>
            <div class="form-status" id="form-status"></div>
          </form>
        `;
      }
      div.innerHTML = html;
      ui.appendChild(div);

      // Progress dot
      const dot = document.createElement('div');
      dot.className = 'prog-dot';
      dot.innerHTML = `<span class="prog-label">${wp.progLabel}</span>`;
      dot.addEventListener('click', () => { targetProgress = i / (totalWaypoints - 1); });
      progressEl.appendChild(dot);
    });

    // ═══════════════════════════════════════
    // THREE.JS SCENE
    // ═══════════════════════════════════════
    const scene = new THREE.Scene();
    scene.fog = new THREE.FogExp2(0x030108, 0.003);

    const camera = new THREE.PerspectiveCamera(65, window.innerWidth / window.innerHeight, 0.1, 600);
    const renderer = new THREE.WebGLRenderer({ antialias: false, powerPreference: 'high-performance' });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));
    renderer.setClearColor(0x030108);
    document.body.prepend(renderer.domElement);

    // ═══════════════════════════════════════
    // CAMERA PATH (CatmullRom spline)
    // ═══════════════════════════════════════
    const pathPoints = waypoints.map(w => new THREE.Vector3(...w.pos));
    // Add control points for smooth entry/exit
    const entryPt = pathPoints[0].clone().add(new THREE.Vector3(0, 0, 15));
    const exitPt = pathPoints[pathPoints.length - 1].clone().add(new THREE.Vector3(0, 0, -15));
    const allPathPts = [entryPt, ...pathPoints, exitPt];
    const cameraPath = new THREE.CatmullRomCurve3(allPathPts, false, 'catmullrom', 0.3);

    // Map waypoint indices to progress values on the spline
    // entryPt is index 0, waypoints are 1..N, exitPt is N+1
    const totalPts = allPathPts.length;
    const wpProgress = waypoints.map((_, i) => (i + 1) / (totalPts - 1));

    // ═══════════════════════════════════════
    // STARFIELD (layered for depth)
    // ═══════════════════════════════════════
    function makeStars(count, spread, sizeRange, brightness) {
      const geo = new THREE.BufferGeometry();
      const pos = new Float32Array(count * 3);
      const sizes = new Float32Array(count);
      const seeds = new Float32Array(count);
      for (let i = 0; i < count; i++) {
        // Distribute along the camera path with spread
        const t = Math.random();
        const pathPt = cameraPath.getPointAt(t);
        pos[i*3]   = pathPt.x + (Math.random() - 0.5) * spread;
        pos[i*3+1] = pathPt.y + (Math.random() - 0.5) * spread;
        pos[i*3+2] = pathPt.z + (Math.random() - 0.5) * spread;
        sizes[i] = sizeRange[0] + Math.random() * (sizeRange[1] - sizeRange[0]);
        seeds[i] = Math.random() * 6.28;
      }
      geo.setAttribute('position', new THREE.Float32BufferAttribute(pos, 3));
      geo.setAttribute('size', new THREE.Float32BufferAttribute(sizes, 1));
      geo.setAttribute('seed', new THREE.Float32BufferAttribute(seeds, 1));

      const mat = new THREE.ShaderMaterial({
        uniforms: { uTime: { value: 0 }, uBright: { value: brightness } },
        vertexShader: `
          attribute float size;
          attribute float seed;
          uniform float uTime;
          varying float vAlpha;
          void main() {
            vec4 mv = modelViewMatrix * vec4(position, 1.0);
            gl_PointSize = size * (120.0 / -mv.z);
            gl_Position = projectionMatrix * mv;
            vAlpha = 0.3 + 0.7 * abs(sin(uTime * 0.4 + seed));
          }
        `,
        fragmentShader: `
          uniform float uBright;
          varying float vAlpha;
          void main() {
            float d = length(gl_PointCoord - 0.5) * 2.0;
            if (d > 1.0) discard;
            float a = (1.0 - d * d) * vAlpha * uBright;
            gl_FragColor = vec4(0.75, 0.82, 1.0, a);
          }
        `,
        transparent: true, depthWrite: false,
      });
      return { points: new THREE.Points(geo, mat), mat };
    }

    // Close stars (bright, small spread)
    const nearStars = makeStars(800, 60, [0.3, 2.0], 0.7);
    scene.add(nearStars.points);
    // Far stars (dim, wide spread)
    const farStars = makeStars(1500, 200, [0.2, 1.2], 0.35);
    scene.add(farStars.points);

    // ═══════════════════════════════════════
    // WAYPOINT STARS (glowing orbs)
    // ═══════════════════════════════════════
    function createGlow(color) {
      const c = document.createElement('canvas');
      c.width = 64; c.height = 64;
      const ctx = c.getContext('2d');
      const g = ctx.createRadialGradient(32,32,0,32,32,32);
      g.addColorStop(0, color);
      g.addColorStop(0.3, color + 'aa');
      g.addColorStop(0.6, color + '33');
      g.addColorStop(1, 'transparent');
      ctx.fillStyle = g;
      ctx.fillRect(0,0,64,64);
      return new THREE.CanvasTexture(c);
    }

    const wpMeshes = [];
    waypoints.forEach((wp, i) => {
      const col = new THREE.Color(wp.color);
      // Sphere
      const size = i === 0 ? 0.6 : 0.35;
      const geo = new THREE.SphereGeometry(size, 48, 48);
      const mat = new THREE.MeshBasicMaterial({ color: col });
      const mesh = new THREE.Mesh(geo, mat);
      mesh.position.set(...wp.pos);
      scene.add(mesh);

      // Inner glow
      const sMat = new THREE.SpriteMaterial({
        map: createGlow(wp.color),
        transparent: true, opacity: 0.8,
        depthWrite: false, blending: THREE.AdditiveBlending,
      });
      const sprite = new THREE.Sprite(sMat);
      const glowSize = i === 0 ? 4 : 2.5;
      sprite.scale.set(glowSize, glowSize, 1);
      sprite.position.set(...wp.pos);
      scene.add(sprite);

      wpMeshes.push({ mesh, sprite, baseGlow: glowSize });
    });

    // ═══════════════════════════════════════
    // PATH LINE (connecting waypoints)
    // ═══════════════════════════════════════
    const pathLineGeo = new THREE.BufferGeometry();
    const pathLinePts = [];
    for (let i = 0; i <= 300; i++) {
      const pt = cameraPath.getPointAt(i / 300);
      pathLinePts.push(pt.x, pt.y, pt.z);
    }
    pathLineGeo.setAttribute('position', new THREE.Float32BufferAttribute(pathLinePts, 3));
    const pathLineMat = new THREE.LineBasicMaterial({
      color: 0x334477,
      transparent: true,
      opacity: 0.12,
    });
    scene.add(new THREE.Line(pathLineGeo, pathLineMat));

    // ═══════════════════════════════════════
    // NEBULA CLOUDS (colored ambiance near waypoints)
    // ═══════════════════════════════════════
    function createNebula(color, opacity) {
      const c = document.createElement('canvas');
      c.width = 128; c.height = 128;
      const ctx = c.getContext('2d');
      const g = ctx.createRadialGradient(64,64,0,64,64,64);
      g.addColorStop(0, color + Math.round(opacity * 255).toString(16).padStart(2,'0'));
      g.addColorStop(0.5, color + '11');
      g.addColorStop(1, 'transparent');
      ctx.fillStyle = g;
      ctx.fillRect(0,0,128,128);
      return new THREE.CanvasTexture(c);
    }

    waypoints.forEach((wp, i) => {
      if (i === 0 || i === waypoints.length - 1) return;
      const nMat = new THREE.SpriteMaterial({
        map: createNebula(wp.color, 0.06),
        transparent: true, depthWrite: false,
        blending: THREE.AdditiveBlending,
      });
      const nebula = new THREE.Sprite(nMat);
      nebula.scale.set(30, 30, 1);
      const p = wp.pos;
      nebula.position.set(p[0] + (Math.random()-0.5)*5, p[1] + (Math.random()-0.5)*5, p[2] - 5);
      scene.add(nebula);
    });

    // ═══════════════════════════════════════
    // NAVIGATION STATE
    // ═══════════════════════════════════════
    let progress = 0;          // Current smooth progress (0-1)
    let targetProgress = 0;    // Target progress (driven by input)
    const speed = 0.035;       // How fast we move per scroll tick
    let currentWaypoint = 0;
    let lastTime = performance.now();

    // ═══════════════════════════════════════
    // INPUT HANDLING
    // ═══════════════════════════════════════

    // Wheel (desktop)
    window.addEventListener('wheel', (e) => {
      e.preventDefault();
      const delta = Math.sign(e.deltaY) * speed;
      targetProgress = Math.max(0, Math.min(1, targetProgress + delta));
    }, { passive: false });

    // Touch (mobile)
    let touchStartY = 0;
    let touchStartProgress = 0;
    window.addEventListener('touchstart', (e) => {
      // Don't intercept form inputs
      if (e.target.closest('.contact-form') || e.target.closest('.social-link')) return;
      touchStartY = e.touches[0].clientY;
      touchStartProgress = targetProgress;
    }, { passive: true });

    window.addEventListener('touchmove', (e) => {
      if (e.target.closest('.contact-form') || e.target.closest('.social-link')) return;
      e.preventDefault();
      const deltaY = touchStartY - e.touches[0].clientY;
      const sensitivity = 1.8 / window.innerHeight;
      targetProgress = Math.max(0, Math.min(1, touchStartProgress + deltaY * sensitivity));
    }, { passive: false });

    // Keyboard
    window.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowDown' || e.key === ' ') {
        e.preventDefault();
        // Jump to next waypoint
        const next = Math.min(currentWaypoint + 1, totalWaypoints - 1);
        targetProgress = wpProgress[next];
      } else if (e.key === 'ArrowUp') {
        e.preventDefault();
        const prev = Math.max(currentWaypoint - 1, 0);
        targetProgress = wpProgress[prev];
      }
    });

    // ═══════════════════════════════════════
    // ANIMATION LOOP
    // ═══════════════════════════════════════
    const scrollHint = document.getElementById('scroll-hint');
    const progDots = document.querySelectorAll('.prog-dot');
    const wpTextEls = waypoints.map((_, i) => document.getElementById(`wp-${i}`));

    function animate() {
      requestAnimationFrame(animate);

      const now = performance.now();
      const dt = Math.min((now - lastTime) / 1000, 0.05);
      lastTime = now;

      // Smooth progress interpolation
      const lerpSpeed = 2.5;
      progress += (targetProgress - progress) * Math.min(lerpSpeed * dt * 4, 1);
      progress = Math.max(0, Math.min(1, progress));

      // Camera position on spline
      const camT = Math.max(0.001, Math.min(0.999, progress));
      const camPos = cameraPath.getPointAt(camT);
      camera.position.copy(camPos);

      // Look ahead on path
      const lookT = Math.min(camT + 0.015, 0.999);
      const lookAt = cameraPath.getPointAt(lookT);
      camera.lookAt(lookAt);

      // Subtle camera roll based on lateral movement
      const tangent = cameraPath.getTangentAt(camT);
      camera.rotation.z = -tangent.x * 0.08;

      // Update star twinkle
      const elapsed = now * 0.001;
      nearStars.mat.uniforms.uTime.value = elapsed;
      farStars.mat.uniforms.uTime.value = elapsed;

      // Pulse waypoint glows
      wpMeshes.forEach((wm, i) => {
        const pulse = 1 + 0.15 * Math.sin(elapsed * 1.5 + i * 1.7);
        wm.sprite.scale.setScalar(wm.baseGlow * pulse);
        // Brighten when camera is near
        const dist = camera.position.distanceTo(wm.mesh.position);
        wm.sprite.material.opacity = dist < 15 ? 0.9 : 0.5;
      });

      // Determine active waypoint
      let closest = 0;
      let closestDist = Infinity;
      wpProgress.forEach((wp, i) => {
        const d = Math.abs(progress - wp);
        if (d < closestDist) { closestDist = d; closest = i; }
      });
      currentWaypoint = closest;

      // Update waypoint text visibility
      wpTextEls.forEach((el, i) => {
        const dist = Math.abs(progress - wpProgress[i]);
        const threshold = 0.055;
        if (dist < threshold) {
          el.classList.add('active');
        } else {
          el.classList.remove('active');
        }
      });

      // Update progress dots
      progDots.forEach((dot, i) => {
        dot.classList.toggle('active', i === currentWaypoint);
      });

      // Hide scroll hint after first movement
      if (progress > 0.01) scrollHint.classList.add('hidden');

      renderer.render(scene, camera);
    }

    animate();

    // ═══════════════════════════════════════
    // RESIZE
    // ═══════════════════════════════════════
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

  })();

  // ═══════════════════════════════════════
  // CONTACT FORM
  // ═══════════════════════════════════════
  const _p = ['4c640b23','07af','4c37','b7df','c4a277e290f3'];
  document.getElementById('form-key').value = _p.join('-');
  let _lastSubmit = 0;

  async function handleSubmit(e) {
    e.preventDefault();
    const btn = document.getElementById('submit-btn');
    const status = document.getElementById('form-status');
    const form = document.getElementById('contact-form');
    const now = Date.now();
    if (now - _lastSubmit < 30000) {
      status.textContent = 'Please wait before sending again.';
      status.className = 'form-status error';
      return;
    }
    const hp = document.getElementById('_hp');
    if (hp && hp.value) return;
    btn.textContent = 'Sending...';
    btn.disabled = true;
    status.textContent = '';
    try {
      const resp = await fetch('https://api.web3forms.com/submit', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          access_key: document.getElementById('form-key').value,
          name: document.getElementById('c-name').value,
          email: document.getElementById('c-email').value,
          message: document.getElementById('c-msg').value,
          subject: 'New message from nitinganneboina.com',
          botcheck: '',
        })
      });
      const data = await resp.json();
      if (data.success) {
        status.textContent = '✓ Sent! I\'ll get back to you soon.';
        status.className = 'form-status success';
        form.reset();
        _lastSubmit = now;
      } else { throw new Error(); }
    } catch (err) {
      status.textContent = 'Something went wrong. Please try again.';
      status.className = 'form-status error';
    }
    btn.textContent = 'Send Message ✉';
    btn.disabled = false;
  }
  </script>
</body>
